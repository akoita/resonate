appId: app.resonate.desktop
productName: Resonate
artifactName: "Resonate-${version}-${os}-${arch}.${ext}"
directories:
  output: dist
files:
  - src/**/*
  - generated/**/*
  - package.json
asar: true
compression: normal
win:
  target:
    - nsis
    - portable
portable:
  artifactName: "Resonate-${version}-win-${arch}-portable.${ext}"
nsis:
  artifactName: "Resonate-${version}-win-${arch}-setup.${ext}"
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  category: public.app-category.music
  target:
    - dmg
    - zip
linux:
  category: Audio;Music
  maintainer: Resonate
  target:
    - AppImage
    - deb
