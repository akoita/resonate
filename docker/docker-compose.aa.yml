services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      [
        "--host",
        "0.0.0.0",
        "--block-time",
        "1",
        "--chain-id",
        "31337",
        "--code-size-limit",
        "50000",
      ]
    ports:
      - "8545:8545"
    healthcheck:
      test:
        ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s
    profiles:
      - local-aa

  anvil-fork:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      [
        "--fork-url",
        "${SEPOLIA_RPC_URL:-https://sepolia.drpc.org}",
        "--chain-id",
        "11155111",
        "--host",
        "0.0.0.0",
        "--block-time",
        "1",
      ]
    ports:
      - "8545:8545"
    healthcheck:
      test:
        ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    profiles:
      - fork-aa

  alto-bundler:
    image: ghcr.io/pimlicolabs/alto:latest
    command: >
      --entrypoints 0x5FbDB2315678afecb367f032d93F642f64180aa3
      --rpc-url http://anvil:8545
      --executor-private-keys 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      --utility-private-key 0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d
      --port 4337
      --network-name local
      --chain-id 31337
      --unsafe
    ports:
      - "4337:4337"
    depends_on:
      anvil:
        condition: service_healthy
    restart: on-failure
    profiles:
      - local-aa

  alto-bundler-fork:
    image: ghcr.io/pimlicolabs/alto:latest
    command: >
      --entrypoints 0x0000000071727De22E5E9d8BAf0edAc6f37da032
      --rpc-url http://anvil-fork:8545
      --executor-private-keys 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      --utility-private-key 0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d
      --port 4337
      --network-name sepolia
      --chain-id 11155111
      --unsafe
      --safe-mode false
      --balance-override false
    ports:
      - "4337:4337"
    depends_on:
      anvil-fork:
        condition: service_healthy
    restart: on-failure
    profiles:
      - fork-aa
