name: CI

on:
  push:
    branches: [main, develop, "feat/*", "fix/*", "docs/*"]
  pull_request:
    branches: [main, develop, "feat/*", "fix/*", "docs/*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      demucs: ${{ steps.detect.outputs.demucs }}
      backend_identity: ${{ steps.detect.outputs.backend_identity }}
      backend_ingestion: ${{ steps.detect.outputs.backend_ingestion }}
      backend_catalog: ${{ steps.detect.outputs.backend_catalog }}
      backend_generation: ${{ steps.detect.outputs.backend_generation }}
      backend_marketplace: ${{ steps.detect.outputs.backend_marketplace }}
      backend_shared: ${{ steps.detect.outputs.backend_shared }}
      web: ${{ steps.detect.outputs.web }}
      contracts: ${{ steps.detect.outputs.contracts }}
      shared: ${{ steps.detect.outputs.shared }}
      docs_only: ${{ steps.detect.outputs.docs_only }}
      run_all: ${{ steps.detect.outputs.run_all }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Classify changed paths
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          backend=false
          demucs=false
          backend_identity=false
          backend_ingestion=false
          backend_catalog=false
          backend_generation=false
          backend_marketplace=false
          backend_shared=false
          web=false
          contracts=false
          shared=false
          docs=false
          infra=false
          run_all=false

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
            echo "Unable to determine diff base safely; running full CI."
            run_all=true
          elif ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            echo "Base commit ${base_sha} is not available locally; running full CI."
            run_all=true
          fi

          if [[ "${run_all}" == "false" ]]; then
            mapfile -t changed_files < <(git diff --name-only "${base_sha}...HEAD")

            if [[ ${#changed_files[@]} -eq 0 ]]; then
              echo "No changed files detected from git diff; running full CI."
              run_all=true
            else
              printf 'Changed files:\n%s\n' "${changed_files[@]}"

              # Keep this mapping conservative: ambiguous changes should land in
              # "shared" so the full cross-module safety net still runs.
              for file in "${changed_files[@]}"; do
                case "${file}" in
                  backend/src/modules/auth/*|backend/src/modules/identity/*|backend/src/modules/sessions/*|backend/src/modules/webauthn/*|backend/src/tests/auth.*|backend/src/tests/sessions.*|backend/src/tests/wallet.*|backend/src/tests/session_key.spec.ts|backend/src/tests/erc4337_client.integration.spec.ts|backend/src/tests/erc6492.spec.ts|backend/src/tests/roles.guard.spec.ts|backend/src/tests/social_recovery.spec.ts)
                    backend=true
                    backend_identity=true
                    ;;
                  backend/src/modules/ingestion/*|backend/src/modules/storage/*|backend/src/modules/encryption/*|backend/src/modules/fingerprint/*|backend/src/tests/asset_persistence.integration.spec.ts|backend/src/tests/demucs_integration.spec.ts|backend/src/tests/encryption.spec.ts|backend/src/tests/fingerprint.service.integration.spec.ts|backend/src/tests/flow1_ingestion.integration.spec.ts|backend/src/tests/ingestion*|backend/src/tests/pubsub-runtime.spec.ts|backend/src/tests/release-pipeline.spec.ts|backend/src/tests/separation-progress.regression.spec.ts|backend/src/tests/stem-*|backend/src/tests/stems-*|backend/src/tests/storage.integration.spec.ts|backend/src/tests/upload-rights-policy.spec.ts|backend/src/tests/upload-rights-routing.integration.spec.ts)
                    backend=true
                    backend_ingestion=true
                    ;;
                  backend/src/modules/catalog/*|backend/src/modules/contracts/*|backend/src/modules/library/*|backend/src/tests/catalog.*|backend/src/tests/contracts.integration.spec.ts|backend/src/tests/flow2_contracts.integration.spec.ts|backend/src/tests/indexer.integration.spec.ts|backend/src/tests/metadata.controller.integration.spec.ts|backend/src/tests/stem-pricing.*)
                    backend=true
                    backend_catalog=true
                    ;;
                  backend/src/modules/agents/*|backend/src/modules/embeddings/*|backend/src/modules/generation/*|backend/src/modules/openapi/*|backend/src/tests/agent_*|backend/src/tests/agents.spec.ts|backend/src/tests/embeddings.spec.ts|backend/src/tests/flow4_generation.integration.spec.ts|backend/src/tests/generation.*|backend/src/tests/lyria_client.spec.ts|backend/src/tests/openapi.controller.spec.ts|backend/src/tests/tool_declarations.integration.spec.ts)
                    backend=true
                    backend_generation=true
                    ;;
                  backend/src/modules/analytics/*|backend/src/modules/artist/*|backend/src/modules/curation/*|backend/src/modules/dmca/*|backend/src/modules/notifications/*|backend/src/modules/payments/*|backend/src/modules/playlist/*|backend/src/modules/pricing/*|backend/src/modules/recommendations/*|backend/src/modules/remix/*|backend/src/modules/rights/*|backend/src/modules/storefront/*|backend/src/modules/trust/*|backend/src/modules/x402/*|backend/src/tests/analytics.spec.ts|backend/src/tests/artist.*|backend/src/tests/curation.spec.ts|backend/src/tests/curator-reputation.integration.spec.ts|backend/src/tests/dmca.service.integration.spec.ts|backend/src/tests/payments.spec.ts|backend/src/tests/playlist.*|backend/src/tests/pricing.spec.ts|backend/src/tests/recommendations.*|backend/src/tests/remix.spec.ts|backend/src/tests/rights-evidence.spec.ts|backend/src/tests/storefront.service.spec.ts|backend/src/tests/trust-*|backend/src/tests/trust.controller.spec.ts|backend/src/tests/verification-semantics.spec.ts|backend/src/tests/x402.*)
                    backend=true
                    backend_marketplace=true
                    ;;
                  backend/jest*|backend/package-lock.json|backend/package.json|backend/TESTING.md|backend/prisma/*|backend/src/main.ts|backend/src/modules/audit/*|backend/src/modules/health/*|backend/src/modules/maintenance/*|backend/src/modules/shared/*|backend/src/tests/event_bus.spec.ts|backend/src/tests/global*|backend/src/tests/health.integration.spec.ts|backend/src/tests/prisma_postgres.integration.spec.ts|backend/src/tests/testcontainers.setup.ts)
                    backend=true
                    backend_shared=true
                    ;;
                  backend/*)
                    backend=true
                    backend_shared=true
                    ;;
                  workers/demucs/*)
                    demucs=true
                    ;;
                  web/*)
                    web=true
                    ;;
                  contracts/*)
                    contracts=true
                    ;;
                  docs/*|*.md)
                    docs=true
                    ;;
                  infra/*|terraform/*)
                    infra=true
                    ;;
                  .github/workflows/*|.github/actions/*|scripts/*|package.json|package-lock.json|pnpm-lock.yaml|yarn.lock|tsconfig*.json|eslint.config.*|.eslintrc*|turbo.json|Makefile|docker-compose*.yml|docker-compose*.yaml)
                    shared=true
                    ;;
                  *)
                    shared=true
                    ;;
                esac
              done
            fi
          fi

          docs_only=false
          # Infra-only and docs-only changes can skip module-specific jobs, but
          # anything that doesn't classify cleanly falls back to a full run.
          if [[ "${run_all}" == "false" && "${backend}" == "false" && "${demucs}" == "false" && "${web}" == "false" && "${contracts}" == "false" && "${shared}" == "false" ]]; then
            if [[ "${docs}" == "true" || "${infra}" == "true" ]]; then
              docs_only=true
            else
              echo "Change classification was empty or ambiguous; running full CI."
              run_all=true
            fi
          fi

          echo "backend=${backend}" >> "${GITHUB_OUTPUT}"
          echo "demucs=${demucs}" >> "${GITHUB_OUTPUT}"
          echo "backend_identity=${backend_identity}" >> "${GITHUB_OUTPUT}"
          echo "backend_ingestion=${backend_ingestion}" >> "${GITHUB_OUTPUT}"
          echo "backend_catalog=${backend_catalog}" >> "${GITHUB_OUTPUT}"
          echo "backend_generation=${backend_generation}" >> "${GITHUB_OUTPUT}"
          echo "backend_marketplace=${backend_marketplace}" >> "${GITHUB_OUTPUT}"
          echo "backend_shared=${backend_shared}" >> "${GITHUB_OUTPUT}"
          echo "web=${web}" >> "${GITHUB_OUTPUT}"
          echo "contracts=${contracts}" >> "${GITHUB_OUTPUT}"
          echo "shared=${shared}" >> "${GITHUB_OUTPUT}"
          echo "docs_only=${docs_only}" >> "${GITHUB_OUTPUT}"
          echo "run_all=${run_all}" >> "${GITHUB_OUTPUT}"

          {
            echo "### Change detection"
            echo ""
            echo "- backend: ${backend}"
            echo "- demucs: ${demucs}"
            echo "- backend_identity: ${backend_identity}"
            echo "- backend_ingestion: ${backend_ingestion}"
            echo "- backend_catalog: ${backend_catalog}"
            echo "- backend_generation: ${backend_generation}"
            echo "- backend_marketplace: ${backend_marketplace}"
            echo "- backend_shared: ${backend_shared}"
            echo "- web: ${web}"
            echo "- contracts: ${contracts}"
            echo "- shared: ${shared}"
            echo "- docs_only: ${docs_only}"
            echo "- run_all: ${run_all}"
          } >> "${GITHUB_STEP_SUMMARY}"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: No lint needed for docs-only changes
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change detected; skipping backend/web lint."

      - name: Setup Node.js
        if: needs.changes.outputs.docs_only != 'true' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            backend/package-lock.json

      - name: Install web dependencies
        if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Run web lint
        if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm run lint
        working-directory: web

      - name: Install backend dependencies
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npx prisma generate
        working-directory: backend

      - name: Run backend lint
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm run lint
        working-directory: backend

  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.contracts == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: ./scripts/install-deps.sh
        working-directory: contracts

      - name: Run Forge build
        run: forge build
        working-directory: contracts

      - name: Run Forge tests
        run: forge test -vvv --no-match-path "test/formal/*"
        working-directory: contracts

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      - name: Run selected backend unit tests
        run: |
          set -euo pipefail

          selection="$(BACKEND_RUN_ALL='${{ needs.changes.outputs.run_all }}' \
            REPO_SHARED='${{ needs.changes.outputs.shared }}' \
            BACKEND_SHARED='${{ needs.changes.outputs.backend_shared }}' \
            BACKEND_IDENTITY='${{ needs.changes.outputs.backend_identity }}' \
            BACKEND_INGESTION='${{ needs.changes.outputs.backend_ingestion }}' \
            BACKEND_CATALOG='${{ needs.changes.outputs.backend_catalog }}' \
            BACKEND_GENERATION='${{ needs.changes.outputs.backend_generation }}' \
            BACKEND_MARKETPLACE='${{ needs.changes.outputs.backend_marketplace }}' \
            bash ../.github/scripts/select-backend-tests.sh unit)"

          if [[ "${selection}" == "__FULL_SUITE__" ]]; then
            echo "Running full backend unit suite"
            npx jest --runInBand --config jest.config.js
          else
            printf 'Selected backend unit tests:\n%s\n' "${selection}"
            mapfile -t tests < <(printf '%s\n' "${selection}")
            npx jest --runInBand --config jest.config.js "${tests[@]}"
          fi
        working-directory: backend
        env:
          SKIP_DEMUCS_INTEGRATION: "true"
          JWT_SECRET: ci-test-secret
          ENCRYPTION_SECRET: ci-test-encryption-secret

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
    # No service containers needed — Testcontainers handles all infrastructure
    # (Postgres, Redis, Anvil, Pub/Sub) with isolated containers on random ports
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      # No 'prisma db push' needed — Testcontainers globalSetup handles schema sync
      - name: Run selected backend integration tests
        run: |
          set -euo pipefail

          selection="$(BACKEND_RUN_ALL='${{ needs.changes.outputs.run_all }}' \
            REPO_SHARED='${{ needs.changes.outputs.shared }}' \
            BACKEND_SHARED='${{ needs.changes.outputs.backend_shared }}' \
            BACKEND_IDENTITY='${{ needs.changes.outputs.backend_identity }}' \
            BACKEND_INGESTION='${{ needs.changes.outputs.backend_ingestion }}' \
            BACKEND_CATALOG='${{ needs.changes.outputs.backend_catalog }}' \
            BACKEND_GENERATION='${{ needs.changes.outputs.backend_generation }}' \
            BACKEND_MARKETPLACE='${{ needs.changes.outputs.backend_marketplace }}' \
            bash ../.github/scripts/select-backend-tests.sh integration)"

          if [[ "${selection}" == "__FULL_SUITE__" ]]; then
            echo "Running full backend integration suite"
            npx jest --runInBand --forceExit --config jest.integration.config.js
          else
            printf 'Selected backend integration tests:\n%s\n' "${selection}"
            mapfile -t tests < <(printf '%s\n' "${selection}")
            npx jest --runInBand --forceExit --config jest.integration.config.js "${tests[@]}"
          fi
        working-directory: backend
        env:
          # Testcontainers sets DATABASE_URL, REDIS_URL, ANVIL_RPC_URL, PUBSUB_EMULATOR_HOST
          # via globalSetup.js → .testcontainers.env.json
          STEM_PROCESSING_MODE: sync
          JWT_SECRET: ci-test-secret
          ENCRYPTION_SECRET: ci-test-encryption-secret

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [changes, backend-unit-tests, backend-integration-tests]
    if: always() && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    steps:
      - name: Verify backend test jobs
        run: |
          set -euo pipefail

          unit_result="${{ needs.backend-unit-tests.result }}"
          integration_result="${{ needs.backend-integration-tests.result }}"

          echo "Backend unit tests: ${unit_result}"
          echo "Backend integration tests: ${integration_result}"

          if [[ "${unit_result}" != "success" ]]; then
            echo "Backend unit tests did not succeed"
            exit 1
          fi

          if [[ "${integration_result}" != "success" ]]; then
            echo "Backend integration tests did not succeed"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Verify build output
        run: |
          ls -ld web/.next
          ls -R web/.next | head -n 20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: web-build
          path: |
            web/.next/
            web/public/
            web/package.json
            web/package-lock.json
          include-hidden-files: true
          retention-days: 1

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: resonate
          POSTGRES_PASSWORD: resonate
          POSTGRES_DB: resonate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U resonate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            backend/package-lock.json

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: web

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      - name: Sync database schema
        run: npx prisma db push --skip-generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://resonate:resonate@localhost:5432/resonate

      - name: Install web dependencies
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
        working-directory: web

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: web

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: web
        env:
          CI: true
          DATABASE_URL: postgresql://resonate:resonate@localhost:5432/resonate
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: dev-secret
          STEM_PROCESSING_MODE: sync

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  publish-deploy-images:
    name: Publish Deployable Images
    runs-on: ubuntu-latest
    needs: [changes, lint, contracts, backend-tests, build, e2e-tests]
    if: always() && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
    environment: ${{ github.ref_name == 'main' && 'staging' || github.ref_name == 'develop' && 'dev' || '' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Resolve publish plan
        id: plan
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
        run: |
          set -euo pipefail

          case "${BRANCH_NAME}" in
            main)
              environment="staging"
              demucs_dockerfile="Dockerfile.gpu"
              ;;
            develop)
              environment="dev"
              demucs_dockerfile="Dockerfile"
              ;;
            *)
              echo "Unsupported deploy branch: ${BRANCH_NAME}" >&2
              exit 1
              ;;
          esac

          if [[ -z "${GCP_PROJECT_ID}" || -z "${GCP_REGION}" ]]; then
            echo "Missing required environment variables: GCP_PROJECT_ID and/or GCP_REGION" >&2
            exit 1
          fi

          services=()
          if [[ "${{ needs.changes.outputs.run_all }}" == "true" || "${{ needs.changes.outputs.shared }}" == "true" ]]; then
            services+=(backend frontend demucs)
          else
            [[ "${{ needs.changes.outputs.backend }}" == "true" ]] && services+=(backend)
            [[ "${{ needs.changes.outputs.web }}" == "true" ]] && services+=(frontend)
            [[ "${{ needs.changes.outputs.demucs }}" == "true" ]] && services+=(demucs)
          fi

          services_csv=""
          if [[ ${#services[@]} -gt 0 ]]; then
            printf -v services_csv '%s,' "${services[@]}"
            services_csv="${services_csv%,}"
          fi

          should_dispatch="false"
          if [[ -n "${services_csv}" ]]; then
            should_dispatch="true"
          fi

          registry="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/resonate-${environment}"

          {
            echo "environment=${environment}"
            echo "registry=${registry}"
            echo "services_csv=${services_csv}"
            echo "should_dispatch=${should_dispatch}"
            echo "release_sha=${GITHUB_SHA}"
            echo "release_id=ci-${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}"
            echo "demucs_dockerfile=${demucs_dockerfile}"
            echo "backend_image=${registry}/backend:${GITHUB_SHA}"
            echo "frontend_image=${registry}/frontend:${GITHUB_SHA}"
            echo "demucs_image=${registry}/demucs-worker:${GITHUB_SHA}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify prerequisite jobs
        run: |
          set -euo pipefail

          if [[ "${{ needs.contracts.result }}" == "failure" ]]; then
            echo "Smart Contract Tests failed; refusing to publish deployable images." >&2
            exit 1
          fi

          if [[ "${{ steps.plan.outputs.should_dispatch }}" != "true" ]]; then
            echo "No deployable services changed on this push; skipping image publication."
            exit 0
          fi

          services=",${{ steps.plan.outputs.services_csv }},"

          if [[ "${services}" == *",backend,"* || "${services}" == *",frontend,"* ]]; then
            if [[ "${{ needs.lint.result }}" != "success" ]]; then
              echo "Lint did not succeed for deployable application changes." >&2
              exit 1
            fi
          fi

          if [[ "${services}" == *",backend,"* && "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "Backend Tests did not succeed for backend image publication." >&2
            exit 1
          fi

          if [[ "${services}" == *",frontend,"* && "${{ needs.build.result }}" != "success" ]]; then
            echo "Build did not succeed for frontend image publication." >&2
            exit 1
          fi

          if [[ "${services}" == *",frontend,"* && "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "E2E Tests did not succeed for frontend image publication." >&2
            exit 1
          fi

      - name: Validate artifact publishing auth
        if: steps.plan.outputs.should_dispatch == 'true'
        env:
          GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
          GCP_ARTIFACT_REGISTRY_SA_EMAIL: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}
        run: |
          if [[ -z "${GCP_WIF_PROVIDER}" ]]; then
            echo "Missing required secret: GCP_WIF_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${GCP_ARTIFACT_REGISTRY_SA_EMAIL}" ]]; then
            echo "Missing required secret: GCP_ARTIFACT_REGISTRY_SA_EMAIL" >&2
            exit 1
          fi

      - name: Authenticate to GCP
        if: steps.plan.outputs.should_dispatch == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}

      - name: Setup gcloud
        if: steps.plan.outputs.should_dispatch == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Export frontend build args
        if: steps.plan.outputs.should_dispatch == 'true' && contains(format(',{0},', steps.plan.outputs.services_csv), ',frontend,')
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ZERODEV_PROJECT_ID: ${{ vars.NEXT_PUBLIC_ZERODEV_PROJECT_ID }}
          NEXT_PUBLIC_CHAIN_ID: ${{ vars.NEXT_PUBLIC_CHAIN_ID }}
          NEXT_PUBLIC_STEM_NFT_ADDRESS: ${{ vars.NEXT_PUBLIC_STEM_NFT_ADDRESS }}
          NEXT_PUBLIC_MARKETPLACE_ADDRESS: ${{ vars.NEXT_PUBLIC_MARKETPLACE_ADDRESS }}
          NEXT_PUBLIC_TRANSFER_VALIDATOR_ADDRESS: ${{ vars.NEXT_PUBLIC_TRANSFER_VALIDATOR_ADDRESS }}
          NEXT_PUBLIC_CONTENT_PROTECTION_ADDRESS: ${{ vars.NEXT_PUBLIC_CONTENT_PROTECTION_ADDRESS }}
          NEXT_PUBLIC_DISPUTE_RESOLUTION_ADDRESS: ${{ vars.NEXT_PUBLIC_DISPUTE_RESOLUTION_ADDRESS }}
          NEXT_PUBLIC_CURATION_REWARDS_ADDRESS: ${{ vars.NEXT_PUBLIC_CURATION_REWARDS_ADDRESS }}
        run: bash .github/scripts/export-frontend-build-args.sh > "${RUNNER_TEMP}/frontend-build.env"

      - name: Build and push backend image
        if: steps.plan.outputs.should_dispatch == 'true' && contains(format(',{0},', steps.plan.outputs.services_csv), ',backend,')
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_ARTIFACT_REGISTRY_SA_EMAIL: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          bash .github/scripts/submit-cloud-build.sh \
            --project "${GCP_PROJECT_ID}" \
            --context backend \
            --dockerfile Dockerfile \
            --git-source-url "https://github.com/${GITHUB_REPOSITORY}" \
            --git-source-revision "${GITHUB_SHA}" \
            --service-account "${GCP_ARTIFACT_REGISTRY_SA_EMAIL}" \
            --image "${{ steps.plan.outputs.backend_image }}"

      - name: Build and push frontend image
        if: steps.plan.outputs.should_dispatch == 'true' && contains(format(',{0},', steps.plan.outputs.services_csv), ',frontend,')
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_ARTIFACT_REGISTRY_SA_EMAIL: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          bash .github/scripts/submit-cloud-build.sh \
            --project "${GCP_PROJECT_ID}" \
            --context web \
            --dockerfile Dockerfile \
            --build-args-file "${RUNNER_TEMP}/frontend-build.env" \
            --git-source-url "https://github.com/${GITHUB_REPOSITORY}" \
            --git-source-revision "${GITHUB_SHA}" \
            --service-account "${GCP_ARTIFACT_REGISTRY_SA_EMAIL}" \
            --image "${{ steps.plan.outputs.frontend_image }}"

      - name: Build and push Demucs image
        if: steps.plan.outputs.should_dispatch == 'true' && contains(format(',{0},', steps.plan.outputs.services_csv), ',demucs,')
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_ARTIFACT_REGISTRY_SA_EMAIL: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          bash .github/scripts/submit-cloud-build.sh \
            --project "${GCP_PROJECT_ID}" \
            --context workers/demucs \
            --dockerfile "${{ steps.plan.outputs.demucs_dockerfile }}" \
            --git-source-url "https://github.com/${GITHUB_REPOSITORY}" \
            --git-source-revision "${GITHUB_SHA}" \
            --service-account "${GCP_ARTIFACT_REGISTRY_SA_EMAIL}" \
            --image "${{ steps.plan.outputs.demucs_image }}"

      - name: Write deploy manifest
        env:
          SHOULD_DISPATCH: ${{ steps.plan.outputs.should_dispatch }}
          ENVIRONMENT: ${{ steps.plan.outputs.environment }}
          SERVICES: ${{ steps.plan.outputs.services_csv }}
          RELEASE_SHA: ${{ steps.plan.outputs.release_sha }}
          RELEASE_ID: ${{ steps.plan.outputs.release_id }}
          ALL_BACKEND_IMAGE: ${{ steps.plan.outputs.backend_image }}
          ALL_FRONTEND_IMAGE: ${{ steps.plan.outputs.frontend_image }}
          ALL_DEMUCS_IMAGE: ${{ steps.plan.outputs.demucs_image }}
        run: |
          python3 - <<'PY' > "${RUNNER_TEMP}/deploy-manifest.json"
          import json
          import os

          services = [item for item in os.environ["SERVICES"].split(",") if item]
          payload = {
              "should_dispatch": os.environ["SHOULD_DISPATCH"] == "true",
              "environment": os.environ["ENVIRONMENT"],
              "source_repository": os.environ["GITHUB_REPOSITORY"],
              "source_ref": os.environ["GITHUB_SHA"],
              "services": os.environ["SERVICES"],
              "trigger_branch": os.environ["GITHUB_REF_NAME"],
              "release_sha": os.environ["RELEASE_SHA"],
              "release_id": os.environ["RELEASE_ID"],
              "backend_image": os.environ["ALL_BACKEND_IMAGE"] if "backend" in services else "",
              "frontend_image": os.environ["ALL_FRONTEND_IMAGE"] if "frontend" in services else "",
              "demucs_image": os.environ["ALL_DEMUCS_IMAGE"] if "demucs" in services else "",
          }
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Upload deploy manifest
        uses: actions/upload-artifact@v6
        with:
          name: deploy-manifest
          path: ${{ runner.temp }}/deploy-manifest.json
          retention-days: 1
