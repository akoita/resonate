name: CI

on:
  push:
    branches: [main, develop, "mergify/merge-queue/**"]
  pull_request:
    branches: [main, develop, "feat/*", "fix/*", "docs/*"]
  merge_group:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      demucs: ${{ steps.detect.outputs.demucs }}
      stable_audio: ${{ steps.detect.outputs.stable_audio }}
      analytics_dataflow: ${{ steps.detect.outputs.analytics_dataflow }}
      backend_identity: ${{ steps.detect.outputs.backend_identity }}
      backend_ingestion: ${{ steps.detect.outputs.backend_ingestion }}
      backend_catalog: ${{ steps.detect.outputs.backend_catalog }}
      backend_generation: ${{ steps.detect.outputs.backend_generation }}
      backend_marketplace: ${{ steps.detect.outputs.backend_marketplace }}
      backend_shared: ${{ steps.detect.outputs.backend_shared }}
      desktop: ${{ steps.detect.outputs.desktop }}
      web: ${{ steps.detect.outputs.web }}
      contracts: ${{ steps.detect.outputs.contracts }}
      shared: ${{ steps.detect.outputs.shared }}
      docs_only: ${{ steps.detect.outputs.docs_only }}
      run_all: ${{ steps.detect.outputs.run_all }}
      main_deploy_only: ${{ steps.detect.outputs.main_deploy_only }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Classify changed paths
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          backend=false
          demucs=false
          stable_audio=false
          analytics_dataflow=false
          backend_identity=false
          backend_ingestion=false
          backend_catalog=false
          backend_generation=false
          backend_marketplace=false
          backend_shared=false
          desktop=false
          web=false
          contracts=false
          shared=false
          docs=false
          infra=false
          run_all=false
          main_deploy_only=false

          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "main" ]]; then
            main_deploy_only=true
            echo "Main push detected; this run will publish/deploy from a merge-queue-certified commit and skip duplicate validation jobs."
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            base_sha="${{ github.event.merge_group.base_sha }}"
            run_all=true
            echo "GitHub merge queue candidate detected; running the full validation safety net once for the queued batch."
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == mergify/merge-queue/* ]]; then
            base_sha="${{ github.event.before }}"
            run_all=true
            echo "Mergify queue branch detected; running the full validation safety net once for the queued batch."
          else
            base_sha="${{ github.event.before }}"
          fi

          if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
            echo "Unable to determine diff base safely; running full CI."
            run_all=true
          elif ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            echo "Base commit ${base_sha} is not available locally; running full CI."
            run_all=true
          fi

          if [[ "${run_all}" == "false" ]]; then
            mapfile -t changed_files < <(git diff --name-only "${base_sha}...HEAD")

            if [[ ${#changed_files[@]} -eq 0 ]]; then
              echo "No changed files detected from git diff; running full CI."
              run_all=true
            else
              printf 'Changed files:\n%s\n' "${changed_files[@]}"

              # Keep this mapping conservative: ambiguous changes should land in
              # "shared" so the full cross-module safety net still runs.
              for file in "${changed_files[@]}"; do
                case "${file}" in
                  backend/src/modules/auth/*|backend/src/modules/identity/*|backend/src/modules/sessions/*|backend/src/modules/webauthn/*|backend/src/tests/auth.*|backend/src/tests/sessions.*|backend/src/tests/wallet.*|backend/src/tests/session_key.spec.ts|backend/src/tests/erc4337_client.integration.spec.ts|backend/src/tests/erc6492.spec.ts|backend/src/tests/roles.guard.spec.ts|backend/src/tests/social_recovery.spec.ts)
                    backend=true
                    backend_identity=true
                    ;;
                  backend/src/modules/ingestion/*|backend/src/modules/storage/*|backend/src/modules/encryption/*|backend/src/modules/fingerprint/*|backend/src/tests/asset_persistence.integration.spec.ts|backend/src/tests/demucs_integration.spec.ts|backend/src/tests/encryption.spec.ts|backend/src/tests/fingerprint.service.integration.spec.ts|backend/src/tests/flow1_ingestion.integration.spec.ts|backend/src/tests/ingestion*|backend/src/tests/pubsub-runtime.spec.ts|backend/src/tests/release-pipeline.spec.ts|backend/src/tests/separation-progress.regression.spec.ts|backend/src/tests/stem-*|backend/src/tests/stems-*|backend/src/tests/storage.integration.spec.ts|backend/src/tests/upload-rights-policy.spec.ts|backend/src/tests/upload-rights-routing.integration.spec.ts)
                    backend=true
                    backend_ingestion=true
                    ;;
                  backend/src/modules/catalog/*|backend/src/modules/contracts/*|backend/src/modules/library/*|backend/src/tests/catalog.*|backend/src/tests/contracts.integration.spec.ts|backend/src/tests/flow2_contracts.integration.spec.ts|backend/src/tests/indexer.integration.spec.ts|backend/src/tests/metadata.controller.integration.spec.ts|backend/src/tests/stem-pricing.*)
                    backend=true
                    backend_catalog=true
                    ;;
                  backend/src/evals/*|backend/src/modules/agents/*|backend/src/modules/embeddings/*|backend/src/modules/generation/*|backend/src/modules/openapi/*|backend/src/tests/agent_*|backend/src/tests/agents.spec.ts|backend/src/tests/embeddings.spec.ts|backend/src/tests/flow4_generation.integration.spec.ts|backend/src/tests/generation.*|backend/src/tests/lyria_client.spec.ts|backend/src/tests/openapi.controller.spec.ts|backend/src/tests/tool_declarations.integration.spec.ts)
                    backend=true
                    backend_generation=true
                    ;;
                  backend/src/modules/analytics/*|backend/src/modules/artist/*|backend/src/modules/curation/*|backend/src/modules/dmca/*|backend/src/modules/notifications/*|backend/src/modules/payments/*|backend/src/modules/playlist/*|backend/src/modules/pricing/*|backend/src/modules/recommendations/*|backend/src/modules/remix/*|backend/src/modules/rights/*|backend/src/modules/storefront/*|backend/src/modules/trust/*|backend/src/modules/x402/*|backend/src/tests/analytics.spec.ts|backend/src/tests/artist.*|backend/src/tests/curation.spec.ts|backend/src/tests/curator-reputation.integration.spec.ts|backend/src/tests/dmca.service.integration.spec.ts|backend/src/tests/payments.spec.ts|backend/src/tests/playlist.*|backend/src/tests/pricing.spec.ts|backend/src/tests/recommendations.*|backend/src/tests/remix.spec.ts|backend/src/tests/rights-evidence.spec.ts|backend/src/tests/storefront.service.spec.ts|backend/src/tests/trust-*|backend/src/tests/trust.controller.spec.ts|backend/src/tests/verification-semantics.spec.ts|backend/src/tests/x402.*)
                    backend=true
                    backend_marketplace=true
                    ;;
                  backend/jest*|backend/package-lock.json|backend/package.json|backend/TESTING.md|backend/prisma/*|backend/src/main.ts|backend/src/modules/audit/*|backend/src/modules/health/*|backend/src/modules/maintenance/*|backend/src/modules/shared/*|backend/src/tests/event_bus.spec.ts|backend/src/tests/global*|backend/src/tests/health.integration.spec.ts|backend/src/tests/prisma_postgres.integration.spec.ts|backend/src/tests/testcontainers.setup.ts)
                    backend=true
                    backend_shared=true
                    ;;
                  backend/*)
                    backend=true
                    backend_shared=true
                    ;;
                  desktop/*)
                    desktop=true
                    ;;
                  workers/demucs/*)
                    demucs=true
                    ;;
                  workers/stable-audio/*)
                    stable_audio=true
                    ;;
                  workers/analytics-dataflow/*)
                    analytics_dataflow=true
                    ;;
                  web/*)
                    web=true
                    ;;
                  .npmrc|.github/actions/*|scripts/*)
                    shared=true
                    ;;
                  contracts/*)
                    contracts=true
                    ;;
                  docs/*|*.md)
                    docs=true
                    ;;
                  infra/*|terraform/*)
                    infra=true
                    ;;
                  .github/workflows/*|.github/actions/*|scripts/*|package.json|package-lock.json|pnpm-lock.yaml|yarn.lock|tsconfig*.json|eslint.config.*|.eslintrc*|turbo.json|Makefile|docker-compose*.yml|docker-compose*.yaml)
                    shared=true
                    ;;
                  *)
                    shared=true
                    ;;
                esac
              done
            fi
          fi

          docs_only=false
          # Infra-only and docs-only changes can skip module-specific jobs, but
          # anything that doesn't classify cleanly falls back to a full run.
          if [[ "${run_all}" == "false" && "${backend}" == "false" && "${demucs}" == "false" && "${stable_audio}" == "false" && "${analytics_dataflow}" == "false" && "${desktop}" == "false" && "${web}" == "false" && "${contracts}" == "false" && "${shared}" == "false" ]]; then
            if [[ "${docs}" == "true" || "${infra}" == "true" ]]; then
              docs_only=true
            else
              echo "Change classification was empty or ambiguous; running full CI."
              run_all=true
            fi
          fi

          echo "backend=${backend}" >> "${GITHUB_OUTPUT}"
          echo "demucs=${demucs}" >> "${GITHUB_OUTPUT}"
          echo "stable_audio=${stable_audio}" >> "${GITHUB_OUTPUT}"
          echo "analytics_dataflow=${analytics_dataflow}" >> "${GITHUB_OUTPUT}"
          echo "backend_identity=${backend_identity}" >> "${GITHUB_OUTPUT}"
          echo "backend_ingestion=${backend_ingestion}" >> "${GITHUB_OUTPUT}"
          echo "backend_catalog=${backend_catalog}" >> "${GITHUB_OUTPUT}"
          echo "backend_generation=${backend_generation}" >> "${GITHUB_OUTPUT}"
          echo "backend_marketplace=${backend_marketplace}" >> "${GITHUB_OUTPUT}"
          echo "backend_shared=${backend_shared}" >> "${GITHUB_OUTPUT}"
          echo "desktop=${desktop}" >> "${GITHUB_OUTPUT}"
          echo "web=${web}" >> "${GITHUB_OUTPUT}"
          echo "contracts=${contracts}" >> "${GITHUB_OUTPUT}"
          echo "shared=${shared}" >> "${GITHUB_OUTPUT}"
          echo "docs_only=${docs_only}" >> "${GITHUB_OUTPUT}"
          echo "run_all=${run_all}" >> "${GITHUB_OUTPUT}"
          echo "main_deploy_only=${main_deploy_only}" >> "${GITHUB_OUTPUT}"

          {
            echo "### Change detection"
            echo ""
            echo "- backend: ${backend}"
            echo "- demucs: ${demucs}"
            echo "- stable_audio: ${stable_audio}"
            echo "- analytics_dataflow: ${analytics_dataflow}"
            echo "- backend_identity: ${backend_identity}"
            echo "- backend_ingestion: ${backend_ingestion}"
            echo "- backend_catalog: ${backend_catalog}"
            echo "- backend_generation: ${backend_generation}"
            echo "- backend_marketplace: ${backend_marketplace}"
            echo "- backend_shared: ${backend_shared}"
            echo "- desktop: ${desktop}"
            echo "- web: ${web}"
            echo "- contracts: ${contracts}"
            echo "- shared: ${shared}"
            echo "- docs_only: ${docs_only}"
            echo "- run_all: ${run_all}"
            echo "- main_deploy_only: ${main_deploy_only}"
          } >> "${GITHUB_STEP_SUMMARY}"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.main_deploy_only != 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: No lint needed for docs-only changes
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change detected; skipping backend/web lint."

      - name: Setup hardened npm for desktop
        if: needs.changes.outputs.docs_only != 'true' && (needs.changes.outputs.desktop == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
        uses: ./.github/actions/setup-npm-hardened
        with:
          node-version: "22.12.0"
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        if: needs.changes.outputs.desktop == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm ci
        working-directory: desktop

      - name: Run desktop lint
        if: needs.changes.outputs.desktop == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm run lint
        working-directory: desktop

      - name: Setup hardened npm for web/backend
        if: needs.changes.outputs.docs_only != 'true' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
        uses: ./.github/actions/setup-npm-hardened
        with:
          cache-dependency-path: |
            web/package-lock.json
            backend/package-lock.json

      - name: Install web dependencies
        if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Run web lint
        if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm run lint
        working-directory: web

      - name: Install backend dependencies
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm exec -- prisma generate
        working-directory: backend

      - name: Run backend lint
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true'
        run: npm run lint
        working-directory: backend

  npm-lock-sources:
    name: npm Lockfile Source Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.main_deploy_only != 'true' && (needs.changes.outputs.desktop == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup hardened npm
        uses: ./.github/actions/setup-npm-hardened
        with:
          cache-dependency-path: |
            package-lock.json
            desktop/package-lock.json
            web/package-lock.json
            backend/package-lock.json

      - name: Verify npm lockfile sources
        run: npm run security:lock-sources

  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.main_deploy_only != 'true' && (needs.changes.outputs.contracts == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.3

      - name: Install dependencies
        run: ./scripts/install-deps.sh
        working-directory: contracts

      - name: Run Forge build
        run: forge build --extra-output storageLayout
        working-directory: contracts

      - name: Run Forge tests
        run: forge test -vvv --no-match-path "test/formal/*"
        working-directory: contracts

      - name: Check UUPS storage layout
        # Fails if an upgradeable contract's storage layout drifts from its committed
        # baseline (catches layout-breaking changes before they reach a proxy). After
        # an intentional, upgrade-safe change, run
        # `scripts/check-storage-layout.sh --update` and commit the baseline (#1297).
        run: bash scripts/check-storage-layout.sh
        working-directory: contracts

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.main_deploy_only != 'true' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup hardened npm
        uses: ./.github/actions/setup-npm-hardened
        with:
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npm exec -- prisma generate
        working-directory: backend

      - name: Run selected backend unit tests
        run: |
          set -euo pipefail

          selection="$(BACKEND_RUN_ALL='${{ needs.changes.outputs.run_all }}' \
            REPO_SHARED='${{ needs.changes.outputs.shared }}' \
            BACKEND_SHARED='${{ needs.changes.outputs.backend_shared }}' \
            BACKEND_IDENTITY='${{ needs.changes.outputs.backend_identity }}' \
            BACKEND_INGESTION='${{ needs.changes.outputs.backend_ingestion }}' \
            BACKEND_CATALOG='${{ needs.changes.outputs.backend_catalog }}' \
            BACKEND_GENERATION='${{ needs.changes.outputs.backend_generation }}' \
            BACKEND_MARKETPLACE='${{ needs.changes.outputs.backend_marketplace }}' \
            bash ../.github/scripts/select-backend-tests.sh unit)"

          if [[ "${selection}" == "__FULL_SUITE__" ]]; then
            echo "Running full backend unit suite"
            npm exec -- jest --runInBand --config jest.config.js
          else
            printf 'Selected backend unit tests:\n%s\n' "${selection}"
            mapfile -t tests < <(printf '%s\n' "${selection}")
            npm exec -- jest --runInBand --config jest.config.js "${tests[@]}"
          fi
        working-directory: backend
        env:
          SKIP_DEMUCS_INTEGRATION: "true"
          JWT_SECRET: ci-test-secret
          ENCRYPTION_SECRET: ci-test-encryption-secret

      - name: Upload agent golden eval results
        if: always() && hashFiles('backend/eval-results/agent-golden-results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: agent-golden-eval-results
          path: |
            backend/eval-results/agent-golden-results.json
            backend/eval-results/agent-golden-summary.md

      - name: Append agent golden eval summary
        if: always() && hashFiles('backend/eval-results/agent-golden-summary.md') != ''
        run: cat backend/eval-results/agent-golden-summary.md >> "${GITHUB_STEP_SUMMARY}"

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.main_deploy_only != 'true' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    # No service containers needed — Testcontainers handles all infrastructure
    # (Postgres, Redis, Anvil, Pub/Sub) with isolated containers on random ports
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup hardened npm
        uses: ./.github/actions/setup-npm-hardened
        with:
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npm exec -- prisma generate
        working-directory: backend

      # Integration specs that deploy real contracts to the Anvil Testcontainer
      # (e.g. shows.service.integration.spec.ts) require Foundry build artifacts
      # under contracts/out/.
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.3

      - name: Install contract dependencies
        run: ./scripts/install-deps.sh
        working-directory: contracts

      - name: Build contract artifacts for integration tests
        run: forge build
        working-directory: contracts

      # No 'prisma db push' needed — Testcontainers globalSetup handles schema sync
      - name: Run selected backend integration tests
        run: |
          set -euo pipefail

          selection="$(BACKEND_RUN_ALL='${{ needs.changes.outputs.run_all }}' \
            REPO_SHARED='${{ needs.changes.outputs.shared }}' \
            BACKEND_SHARED='${{ needs.changes.outputs.backend_shared }}' \
            BACKEND_IDENTITY='${{ needs.changes.outputs.backend_identity }}' \
            BACKEND_INGESTION='${{ needs.changes.outputs.backend_ingestion }}' \
            BACKEND_CATALOG='${{ needs.changes.outputs.backend_catalog }}' \
            BACKEND_GENERATION='${{ needs.changes.outputs.backend_generation }}' \
            BACKEND_MARKETPLACE='${{ needs.changes.outputs.backend_marketplace }}' \
            bash ../.github/scripts/select-backend-tests.sh integration)"

          if [[ "${selection}" == "__FULL_SUITE__" ]]; then
            echo "Running full backend integration suite"
            npm exec -- jest --runInBand --forceExit --config jest.integration.config.js
          else
            printf 'Selected backend integration tests:\n%s\n' "${selection}"
            mapfile -t tests < <(printf '%s\n' "${selection}")
            npm exec -- jest --runInBand --forceExit --config jest.integration.config.js "${tests[@]}"
          fi
        working-directory: backend
        env:
          # Testcontainers sets DATABASE_URL, REDIS_URL, ANVIL_RPC_URL, PUBSUB_EMULATOR_HOST
          # via globalSetup.js → .testcontainers.env.json
          STEM_PROCESSING_MODE: sync
          JWT_SECRET: ci-test-secret
          ENCRYPTION_SECRET: ci-test-encryption-secret

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [changes, backend-unit-tests, backend-integration-tests]
    if: always() && needs.changes.outputs.main_deploy_only != 'true' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    steps:
      - name: Verify backend test jobs
        run: |
          set -euo pipefail

          unit_result="${{ needs.backend-unit-tests.result }}"
          integration_result="${{ needs.backend-integration-tests.result }}"

          echo "Backend unit tests: ${unit_result}"
          echo "Backend integration tests: ${integration_result}"

          if [[ "${unit_result}" != "success" ]]; then
            echo "Backend unit tests did not succeed"
            exit 1
          fi

          if [[ "${integration_result}" != "success" ]]; then
            echo "Backend integration tests did not succeed"
            exit 1
          fi

  demucs-worker-tests:
    name: Demucs Worker Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.main_deploy_only != 'true' && (needs.changes.outputs.demucs == 'true' || needs.changes.outputs.backend_ingestion == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade fastapi httpx
        working-directory: workers/demucs

      - name: Run Demucs worker unit tests
        run: python -m unittest test_main.py
        working-directory: workers/demucs

  analytics-dataflow-tests:
    name: Analytics Dataflow Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.main_deploy_only != 'true' && (needs.changes.outputs.analytics_dataflow == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run analytics transform tests
        run: python -m unittest test_analytics_transform.py
        working-directory: workers/analytics-dataflow

  desktop-package:
    name: Desktop Package Smoke
    runs-on: ${{ matrix.os }}
    needs: [changes, lint]
    if: needs.changes.outputs.main_deploy_only != 'true' && (needs.changes.outputs.desktop == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: desktop-win-unpacked
          - os: macos-latest
            artifact-name: desktop-mac-unpacked
          - os: ubuntu-latest
            artifact-name: desktop-linux-unpacked
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup hardened npm
        uses: ./.github/actions/setup-npm-hardened
        with:
          node-version: "22.12.0"
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: desktop

      - name: Validate shell config
        run: npm run lint
        working-directory: desktop

      - name: Package unpacked desktop app
        run: npm run package:dir
        working-directory: desktop

      - name: Upload desktop package smoke artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: desktop/dist/
          retention-days: 3

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.main_deploy_only != 'true' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup hardened npm
        uses: ./.github/actions/setup-npm-hardened
        with:
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Verify build output
        run: |
          ls -ld web/.next
          ls -R web/.next | head -n 20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: web-build
          path: |
            web/.next/
            web/public/
            web/package.json
            web/package-lock.json
          include-hidden-files: true
          retention-days: 1

  build-deployable-frontend:
    name: Build Deployable Frontend Artifact
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: always() && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop') && (github.ref_name == 'main' || needs.lint.result == 'success') && (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    environment: ${{ github.ref_name == 'main' && 'staging' || github.ref_name == 'develop' && 'dev' || '' }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup hardened npm
        uses: ./.github/actions/setup-npm-hardened
        with:
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Export frontend build args
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ZERODEV_PROJECT_ID: ${{ vars.NEXT_PUBLIC_ZERODEV_PROJECT_ID }}
          NEXT_PUBLIC_CHAIN_ID: ${{ vars.NEXT_PUBLIC_CHAIN_ID }}
          NEXT_PUBLIC_STEM_NFT_ADDRESS: ${{ vars.NEXT_PUBLIC_STEM_NFT_ADDRESS }}
          NEXT_PUBLIC_MARKETPLACE_ADDRESS: ${{ vars.NEXT_PUBLIC_MARKETPLACE_ADDRESS }}
          NEXT_PUBLIC_TRANSFER_VALIDATOR_ADDRESS: ${{ vars.NEXT_PUBLIC_TRANSFER_VALIDATOR_ADDRESS }}
          NEXT_PUBLIC_CONTENT_PROTECTION_ADDRESS: ${{ vars.NEXT_PUBLIC_CONTENT_PROTECTION_ADDRESS }}
          NEXT_PUBLIC_DISPUTE_RESOLUTION_ADDRESS: ${{ vars.NEXT_PUBLIC_DISPUTE_RESOLUTION_ADDRESS }}
          NEXT_PUBLIC_CURATION_REWARDS_ADDRESS: ${{ vars.NEXT_PUBLIC_CURATION_REWARDS_ADDRESS }}
          NEXT_PUBLIC_SHOW_CAMPAIGN_ESCROW_ADDRESS: ${{ vars.NEXT_PUBLIC_SHOW_CAMPAIGN_ESCROW_ADDRESS }}
          NEXT_PUBLIC_ENV: ${{ vars.NEXT_PUBLIC_ENV }}
          FRONTEND_CONTRACT_DEPLOYMENT_ENV_FILE: ${{ github.ref_name == 'main' && 'contracts/deployments/base-sepolia.remote.env' || '' }}
        run: bash .github/scripts/export-frontend-build-args.sh > "${RUNNER_TEMP}/frontend-build.env"

      - name: Build deployable frontend artifact
        run: |
          set -euo pipefail
          set -a
          source "${RUNNER_TEMP}/frontend-build.env"
          set +a
          npm run build
        working-directory: web

      - name: Verify deployable build output
        run: |
          test -f web/.next/standalone/server.js
          test -d web/.next/static
          test -d web/public

      - name: Upload deployable frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-build-deployable
          path: |
            web/.next/standalone/
            web/.next/static/
            web/public/
          include-hidden-files: true
          retention-days: 1

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.main_deploy_only != 'true' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.run_all == 'true')
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: resonate
          POSTGRES_PASSWORD: resonate
          POSTGRES_DB: resonate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U resonate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup hardened npm
        uses: ./.github/actions/setup-npm-hardened
        with:
          cache-dependency-path: |
            web/package-lock.json
            backend/package-lock.json

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: web

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npm exec -- prisma generate
        working-directory: backend

      - name: Sync database schema
        run: npm exec -- prisma db push --skip-generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://resonate:resonate@localhost:5432/resonate

      - name: Install web dependencies
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npm exec -- playwright install chromium --with-deps
        working-directory: web

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npm exec -- playwright install-deps chromium
        working-directory: web

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: web
        env:
          CI: true
          DATABASE_URL: postgresql://resonate:resonate@localhost:5432/resonate
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: dev-secret
          STEM_PROCESSING_MODE: sync

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  publish-plan:
    name: Resolve Deploy Image Plan
    runs-on: ubuntu-latest
    needs: [changes, lint, npm-lock-sources, contracts, backend-tests, demucs-worker-tests, build, build-deployable-frontend, e2e-tests]
    if: always() && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
    environment: ${{ github.ref_name == 'main' && 'staging' || 'dev' }}
    outputs:
      environment: ${{ steps.plan.outputs.environment }}
      registry: ${{ steps.plan.outputs.registry }}
      services_csv: ${{ steps.plan.outputs.services_csv }}
      should_dispatch: ${{ steps.plan.outputs.should_dispatch }}
      release_sha: ${{ steps.plan.outputs.release_sha }}
      release_id: ${{ steps.plan.outputs.release_id }}
      demucs_dockerfile: ${{ steps.plan.outputs.demucs_dockerfile }}
      stable_audio_dockerfile: ${{ steps.plan.outputs.stable_audio_dockerfile }}
      backend_image: ${{ steps.plan.outputs.backend_image }}
      frontend_image: ${{ steps.plan.outputs.frontend_image }}
      demucs_image: ${{ steps.plan.outputs.demucs_image }}
      stable_audio_image: ${{ steps.plan.outputs.stable_audio_image }}
    permissions:
      contents: read
    steps:
      - name: Resolve publish plan
        id: plan
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
        run: |
          set -euo pipefail

          case "${BRANCH_NAME}" in
            main)
              environment="staging"
              demucs_dockerfile="Dockerfile.gpu"
              ;;
            develop)
              environment="dev"
              demucs_dockerfile="Dockerfile"
              ;;
            *)
              echo "Unsupported deploy branch: ${BRANCH_NAME}" >&2
              exit 1
              ;;
          esac

          if [[ -z "${GCP_PROJECT_ID}" || -z "${GCP_REGION}" ]]; then
            echo "Missing required environment variables: GCP_PROJECT_ID and/or GCP_REGION" >&2
            exit 1
          fi

          services=()
          # Keep the backend ingestion path and Demucs worker deployed together.
          # Upload regressions can otherwise persist in staging when only backend
          # ingestion code changes on later commits and the worker image stays stale.
          if [[ "${{ needs.changes.outputs.run_all }}" == "true" || "${{ needs.changes.outputs.shared }}" == "true" ]]; then
            services+=(backend frontend demucs stable-audio)
          else
            [[ "${{ needs.changes.outputs.backend }}" == "true" ]] && services+=(backend)
            [[ "${{ needs.changes.outputs.web }}" == "true" ]] && services+=(frontend)
            [[ "${{ needs.changes.outputs.demucs }}" == "true" ]] && services+=(demucs)
            [[ "${{ needs.changes.outputs.stable_audio }}" == "true" ]] && services+=(stable-audio)
            if [[ "${{ needs.changes.outputs.backend_ingestion }}" == "true" && " ${services[*]} " != *" demucs "* ]]; then
              services+=(demucs)
            fi
          fi

          services_csv=""
          if [[ ${#services[@]} -gt 0 ]]; then
            printf -v services_csv '%s,' "${services[@]}"
            services_csv="${services_csv%,}"
          fi

          should_dispatch="false"
          if [[ -n "${services_csv}" ]]; then
            should_dispatch="true"
          fi

          registry="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/resonate-${environment}"

          {
            echo "environment=${environment}"
            echo "registry=${registry}"
            echo "services_csv=${services_csv}"
            echo "should_dispatch=${should_dispatch}"
            echo "release_sha=${GITHUB_SHA}"
            echo "release_id=ci-${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}"
            echo "demucs_dockerfile=${demucs_dockerfile}"
            echo "stable_audio_dockerfile=Dockerfile"
            echo "backend_image=${registry}/backend:${GITHUB_SHA}"
            echo "frontend_image=${registry}/frontend:${GITHUB_SHA}"
            echo "demucs_image=${registry}/demucs-worker:${GITHUB_SHA}"
            echo "stable_audio_image=${registry}/stable-audio-worker:${GITHUB_SHA}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify prerequisite jobs
        run: |
          set -euo pipefail

          main_deploy_only="${{ needs.changes.outputs.main_deploy_only }}"
          if [[ "${main_deploy_only}" == "true" ]]; then
            echo "Main deploy-only run: validation is expected to have passed on the merge queue candidate before main moved."
          fi

          if [[ "${{ needs.contracts.result }}" == "failure" ]]; then
            echo "Smart Contract Tests failed; refusing to publish deployable images." >&2
            exit 1
          fi

          if [[ "${{ steps.plan.outputs.should_dispatch }}" != "true" ]]; then
            echo "No deployable services changed on this push; skipping image publication."
            exit 0
          fi

          services=",${{ steps.plan.outputs.services_csv }},"

          if [[ "${services}" == *",backend,"* || "${services}" == *",frontend,"* ]]; then
            if [[ "${main_deploy_only}" != "true" && "${{ needs.lint.result }}" != "success" ]]; then
              echo "Lint did not succeed for deployable application changes." >&2
              exit 1
            fi
            if [[ "${main_deploy_only}" != "true" && "${{ needs.npm-lock-sources.result }}" != "success" ]]; then
              echo "npm lockfile source scan did not succeed for deployable application changes." >&2
              exit 1
            fi
          fi

          if [[ "${main_deploy_only}" != "true" && "${services}" == *",backend,"* && "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "Backend Tests did not succeed for backend image publication." >&2
            exit 1
          fi

          if [[ "${main_deploy_only}" != "true" && "${services}" == *",demucs,"* && "${{ needs.demucs-worker-tests.result }}" != "success" ]]; then
            echo "Demucs Worker Tests did not succeed for Demucs image publication." >&2
            exit 1
          fi

          if [[ "${main_deploy_only}" != "true" && "${services}" == *",frontend,"* && "${{ needs.build.result }}" != "success" ]]; then
            echo "Build did not succeed for frontend image publication." >&2
            exit 1
          fi

          if [[ "${main_deploy_only}" != "true" && "${services}" == *",frontend,"* && "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "E2E Tests did not succeed for frontend image publication." >&2
            exit 1
          fi

          if [[ "${services}" == *",frontend,"* && "${{ needs.build-deployable-frontend.result }}" != "success" ]]; then
            echo "Build Deployable Frontend Artifact did not succeed for frontend image publication." >&2
            exit 1
          fi

      - name: Validate artifact publishing auth
        if: steps.plan.outputs.should_dispatch == 'true'
        env:
          GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
          GCP_ARTIFACT_REGISTRY_SA_EMAIL: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}
        run: |
          if [[ -z "${GCP_WIF_PROVIDER}" ]]; then
            echo "Missing required secret: GCP_WIF_PROVIDER" >&2
            exit 1
          fi
          if [[ -z "${GCP_ARTIFACT_REGISTRY_SA_EMAIL}" ]]; then
            echo "Missing required secret: GCP_ARTIFACT_REGISTRY_SA_EMAIL" >&2
            exit 1
          fi

  publish-backend-image:
    name: Publish Backend Image
    runs-on: ubuntu-latest
    needs: [publish-plan]
    if: always() && needs.publish-plan.result == 'success' && needs.publish-plan.outputs.should_dispatch == 'true' && contains(format(',{0},', needs.publish-plan.outputs.services_csv), ',backend,')
    environment: ${{ needs.publish-plan.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push backend image
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_ARTIFACT_REGISTRY_SA_EMAIL: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          bash .github/scripts/submit-cloud-build.sh \
            --project "${GCP_PROJECT_ID}" \
            --context backend \
            --dockerfile Dockerfile \
            --git-source-url "https://github.com/${GITHUB_REPOSITORY}" \
            --git-source-revision "${GITHUB_SHA}" \
            --service-account "${GCP_ARTIFACT_REGISTRY_SA_EMAIL}" \
            --image "${{ needs.publish-plan.outputs.backend_image }}"

  publish-frontend-image:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    needs: [publish-plan]
    if: always() && needs.publish-plan.result == 'success' && needs.publish-plan.outputs.should_dispatch == 'true' && contains(format(',{0},', needs.publish-plan.outputs.services_csv), ',frontend,')
    environment: ${{ needs.publish-plan.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Download deployable frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: web-build-deployable
          path: ${{ runner.temp }}/web-build-deployable

      - name: Prepare frontend runtime image context
        run: |
          bash .github/scripts/prepare-frontend-runtime-context.sh \
            --artifact-dir "${RUNNER_TEMP}/web-build-deployable" \
            --dockerfile-source "web/Dockerfile.runtime" \
            --output-dir "${RUNNER_TEMP}/frontend-runtime-context"

      - name: Build and push frontend image
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_ARTIFACT_REGISTRY_SA_EMAIL: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}
        run: |
          bash .github/scripts/submit-cloud-build.sh \
            --project "${GCP_PROJECT_ID}" \
            --context "${RUNNER_TEMP}/frontend-runtime-context" \
            --dockerfile Dockerfile \
            --service-account "${GCP_ARTIFACT_REGISTRY_SA_EMAIL}" \
            --image "${{ needs.publish-plan.outputs.frontend_image }}"

  publish-demucs-image:
    name: Publish Demucs Image
    runs-on: ubuntu-latest
    needs: [publish-plan]
    if: always() && needs.publish-plan.result == 'success' && needs.publish-plan.outputs.should_dispatch == 'true' && contains(format(',{0},', needs.publish-plan.outputs.services_csv), ',demucs,')
    environment: ${{ needs.publish-plan.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Demucs image
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_ARTIFACT_REGISTRY_SA_EMAIL: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          bash .github/scripts/submit-cloud-build.sh \
            --project "${GCP_PROJECT_ID}" \
            --context workers/demucs \
            --dockerfile "${{ needs.publish-plan.outputs.demucs_dockerfile }}" \
            --git-source-url "https://github.com/${GITHUB_REPOSITORY}" \
            --git-source-revision "${GITHUB_SHA}" \
            --service-account "${GCP_ARTIFACT_REGISTRY_SA_EMAIL}" \
            --image "${{ needs.publish-plan.outputs.demucs_image }}"

  publish-stable-audio-image:
    name: Publish Stable Audio Image
    runs-on: ubuntu-latest
    needs: [publish-plan]
    if: always() && needs.publish-plan.result == 'success' && needs.publish-plan.outputs.should_dispatch == 'true' && contains(format(',{0},', needs.publish-plan.outputs.services_csv), ',stable-audio,')
    environment: ${{ needs.publish-plan.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Stable Audio image
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_ARTIFACT_REGISTRY_SA_EMAIL: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          bash .github/scripts/submit-cloud-build.sh \
            --project "${GCP_PROJECT_ID}" \
            --context workers/stable-audio \
            --dockerfile "${{ needs.publish-plan.outputs.stable_audio_dockerfile }}" \
            --git-source-url "https://github.com/${GITHUB_REPOSITORY}" \
            --git-source-revision "${GITHUB_SHA}" \
            --service-account "${GCP_ARTIFACT_REGISTRY_SA_EMAIL}" \
            --image "${{ needs.publish-plan.outputs.stable_audio_image }}"

  publish-deploy-images:
    name: Publish Deployable Images
    runs-on: ubuntu-latest
    needs: [publish-plan, publish-backend-image, publish-frontend-image, publish-demucs-image, publish-stable-audio-image]
    if: always() && needs.publish-plan.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Verify publish jobs
        env:
          SHOULD_DISPATCH: ${{ needs.publish-plan.outputs.should_dispatch }}
          SERVICES: ${{ needs.publish-plan.outputs.services_csv }}
          BACKEND_RESULT: ${{ needs.publish-backend-image.result }}
          FRONTEND_RESULT: ${{ needs.publish-frontend-image.result }}
          DEMUCS_RESULT: ${{ needs.publish-demucs-image.result }}
          STABLE_AUDIO_RESULT: ${{ needs.publish-stable-audio-image.result }}
        run: |
          set -euo pipefail

          if [[ "${SHOULD_DISPATCH}" != "true" ]]; then
            echo "No deployable services changed on this push; writing skip manifest."
            exit 0
          fi

          services=",${SERVICES},"

          if [[ "${services}" == *",backend,"* && "${BACKEND_RESULT}" != "success" ]]; then
            echo "Backend image publication did not succeed." >&2
            exit 1
          fi

          if [[ "${services}" == *",frontend,"* && "${FRONTEND_RESULT}" != "success" ]]; then
            echo "Frontend image publication did not succeed." >&2
            exit 1
          fi

          if [[ "${services}" == *",demucs,"* && "${DEMUCS_RESULT}" != "success" ]]; then
            echo "Demucs image publication did not succeed." >&2
            exit 1
          fi

          if [[ "${services}" == *",stable-audio,"* && "${STABLE_AUDIO_RESULT}" != "success" ]]; then
            echo "Stable Audio image publication did not succeed." >&2
            exit 1
          fi

      - name: Write deploy manifest
        env:
          SHOULD_DISPATCH: ${{ needs.publish-plan.outputs.should_dispatch }}
          ENVIRONMENT: ${{ needs.publish-plan.outputs.environment }}
          SERVICES: ${{ needs.publish-plan.outputs.services_csv }}
          RELEASE_SHA: ${{ needs.publish-plan.outputs.release_sha }}
          RELEASE_ID: ${{ needs.publish-plan.outputs.release_id }}
          ALL_BACKEND_IMAGE: ${{ needs.publish-plan.outputs.backend_image }}
          ALL_FRONTEND_IMAGE: ${{ needs.publish-plan.outputs.frontend_image }}
          ALL_DEMUCS_IMAGE: ${{ needs.publish-plan.outputs.demucs_image }}
          ALL_STABLE_AUDIO_IMAGE: ${{ needs.publish-plan.outputs.stable_audio_image }}
        run: |
          python3 - <<'PY' > "${RUNNER_TEMP}/deploy-manifest.json"
          import json
          import os

          services = [item for item in os.environ["SERVICES"].split(",") if item]
          payload = {
              "should_dispatch": os.environ["SHOULD_DISPATCH"] == "true",
              "environment": os.environ["ENVIRONMENT"],
              "source_repository": os.environ["GITHUB_REPOSITORY"],
              "source_ref": os.environ["GITHUB_SHA"],
              "services": os.environ["SERVICES"],
              "trigger_branch": os.environ["GITHUB_REF_NAME"],
              "release_sha": os.environ["RELEASE_SHA"],
              "release_id": os.environ["RELEASE_ID"],
              "backend_image": os.environ["ALL_BACKEND_IMAGE"] if "backend" in services else "",
              "frontend_image": os.environ["ALL_FRONTEND_IMAGE"] if "frontend" in services else "",
              "demucs_image": os.environ["ALL_DEMUCS_IMAGE"] if "demucs" in services else "",
              "stable_audio_image": os.environ["ALL_STABLE_AUDIO_IMAGE"] if "stable-audio" in services else "",
          }
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Upload deploy manifest
        uses: actions/upload-artifact@v6
        with:
          name: deploy-manifest
          path: ${{ runner.temp }}/deploy-manifest.json
          retention-days: 1
