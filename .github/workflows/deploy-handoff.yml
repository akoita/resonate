name: Deploy Handoff

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: Successful CI workflow run ID to hand off for deploy
        required: true
        type: string

env:
  RESONATE_IAC_REPOSITORY: akoita/resonate-iac
  RESONATE_DEPLOY_EVENT: resonate_deploy

jobs:
  dispatch:
    name: Dispatch Non-Prod Deploy
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Normalize trigger context
        id: trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CI_RUN_ID: ${{ inputs.ci_run_id || '' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            run_id="${{ github.event.workflow_run.id }}"
            run_number="${{ github.event.workflow_run.run_number }}"
            head_branch="${{ github.event.workflow_run.head_branch }}"
            head_sha="${{ github.event.workflow_run.head_sha }}"
            run_event="${{ github.event.workflow_run.event }}"
            run_conclusion="${{ github.event.workflow_run.conclusion }}"
          else
            response="$(curl --fail-with-body \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${INPUT_CI_RUN_ID}")"

            eval "$(
              python3 - <<'PY' "${response}"
              import json
              import shlex
              import sys

              payload = json.loads(sys.argv[1])
              for key, value in (
                  ("run_id", payload["id"]),
                  ("run_number", payload["run_number"]),
                  ("head_branch", payload["head_branch"]),
                  ("head_sha", payload["head_sha"]),
                  ("run_event", payload["event"]),
                  ("run_conclusion", payload["conclusion"] or ""),
              ):
                  print(f"{key}={shlex.quote(str(value))}")
              PY
            )"
          fi

          should_continue="true"
          skip_reason=""

          if [[ "${run_conclusion}" != "success" ]]; then
            should_continue="false"
            skip_reason="Referenced CI run was not successful."
          elif [[ "${run_event}" != "push" ]]; then
            should_continue="false"
            skip_reason="Deploy handoff only supports CI runs triggered by push."
          elif [[ "${head_branch}" != "main" && "${head_branch}" != "develop" ]]; then
            should_continue="false"
            skip_reason="Deploy handoff only supports main/develop CI runs."
          fi

          {
            echo "run_id=${run_id}"
            echo "run_number=${run_number}"
            echo "head_branch=${head_branch}"
            echo "head_sha=${head_sha}"
            echo "run_event=${run_event}"
            echo "run_conclusion=${run_conclusion}"
            echo "should_continue=${should_continue}"
            echo "skip_reason=${skip_reason}"
          } >> "${GITHUB_OUTPUT}"

      - name: Download deploy manifest
        if: steps.trigger.outputs.should_continue == 'true'
        uses: actions/download-artifact@v8
        with:
          name: deploy-manifest
          run-id: ${{ steps.trigger.outputs.run_id }}
          github-token: ${{ github.token }}
          path: ${{ runner.temp }}/deploy-manifest

      - name: Resolve deploy intent
        id: intent
        if: steps.trigger.outputs.should_continue == 'true'
        env:
          HEAD_BRANCH: ${{ steps.trigger.outputs.head_branch }}
          HEAD_SHA: ${{ steps.trigger.outputs.head_sha }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
          RUN_NUMBER: ${{ steps.trigger.outputs.run_number }}
          MANIFEST_PATH: ${{ runner.temp }}/deploy-manifest/deploy-manifest.json
        run: |
          if [[ ! -f "${MANIFEST_PATH}" ]]; then
            echo "Missing deploy manifest artifact at ${MANIFEST_PATH}" >&2
            exit 1
          fi

          python3 - <<'PY' "${MANIFEST_PATH}" > "${RUNNER_TEMP}/deploy-intent.env"
          import json
          import sys

          manifest_path = sys.argv[1]
          with open(manifest_path, "r", encoding="utf-8") as fh:
            manifest = json.load(fh)

          for key in (
              "environment",
              "source_ref",
              "services",
              "trigger_branch",
              "release_sha",
              "release_id",
              "backend_image",
              "frontend_image",
              "demucs_image",
          ):
            value = manifest.get(key, "")
            print(f"{key}={value}")

          print(f"should_dispatch={'true' if manifest.get('should_dispatch') else 'false'}")
          PY

          source "${RUNNER_TEMP}/deploy-intent.env"

          case "${HEAD_BRANCH}" in
            develop)
              expected_environment="dev"
              ;;
            main)
              expected_environment="staging"
              ;;
            *)
              echo "Unsupported branch for deploy handoff: ${HEAD_BRANCH}" >&2
              exit 1
              ;;
          esac

          if [[ "${trigger_branch}" != "${HEAD_BRANCH}" ]]; then
            echo "Deploy manifest branch '${trigger_branch}' did not match workflow branch '${HEAD_BRANCH}'" >&2
            exit 1
          fi

          if [[ "${source_ref}" != "${HEAD_SHA}" ]]; then
            echo "Deploy manifest source_ref '${source_ref}' did not match workflow SHA '${HEAD_SHA}'" >&2
            exit 1
          fi

          if [[ "${environment}" != "${expected_environment}" ]]; then
            echo "Deploy manifest environment '${environment}' did not match expected '${expected_environment}' for branch '${HEAD_BRANCH}'" >&2
            exit 1
          fi

          if [[ "${should_dispatch}" == "true" && -z "${services}" ]]; then
            echo "Deploy manifest requested dispatch but did not include services." >&2
            exit 1
          fi

          {
            echo "should_dispatch=${should_dispatch}"
            echo "environment=${environment}"
            echo "services=${services}"
            echo "source_ref=${source_ref}"
            echo "trigger_branch=${trigger_branch}"
            echo "release_sha=${release_sha:-${HEAD_SHA}}"
            echo "release_id=${release_id:-ci-${RUN_ID}-${RUN_NUMBER}}"
            echo "backend_image=${backend_image}"
            echo "frontend_image=${frontend_image}"
            echo "demucs_image=${demucs_image}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate dispatch token
        if: steps.trigger.outputs.should_continue == 'true' && steps.intent.outputs.should_dispatch == 'true'
        env:
          DISPATCH_TOKEN: ${{ secrets.RESONATE_IAC_DISPATCH_TOKEN }}
        run: |
          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "Missing required secret: RESONATE_IAC_DISPATCH_TOKEN" >&2
            exit 1
          fi

      - name: Dispatch deploy intent to resonate-iac
        if: steps.trigger.outputs.should_continue == 'true' && steps.intent.outputs.should_dispatch == 'true'
        env:
          DISPATCH_TOKEN: ${{ secrets.RESONATE_IAC_DISPATCH_TOKEN }}
          ENVIRONMENT: ${{ steps.intent.outputs.environment }}
          SERVICES: ${{ steps.intent.outputs.services }}
          SOURCE_REF: ${{ steps.intent.outputs.source_ref }}
          TRIGGER_BRANCH: ${{ steps.intent.outputs.trigger_branch }}
          RELEASE_SHA: ${{ steps.intent.outputs.release_sha }}
          RELEASE_ID: ${{ steps.intent.outputs.release_id }}
          BACKEND_IMAGE: ${{ steps.intent.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ steps.intent.outputs.frontend_image }}
          DEMUCS_IMAGE: ${{ steps.intent.outputs.demucs_image }}
        run: |
          payload="$(cat <<EOF
          {
            "event_type": "${RESONATE_DEPLOY_EVENT}",
            "client_payload": {
              "environment": "${ENVIRONMENT}",
              "source_ref": "${SOURCE_REF}",
              "services": "${SERVICES}",
              "action": "apply",
              "release_sha": "${RELEASE_SHA}",
              "release_id": "${RELEASE_ID}",
              "trigger_branch": "${TRIGGER_BRANCH}",
              "backend_image": "${BACKEND_IMAGE}",
              "frontend_image": "${FRONTEND_IMAGE}",
              "demucs_image": "${DEMUCS_IMAGE}"
            }
          }
          EOF
          )"

          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${RESONATE_IAC_REPOSITORY}/dispatches" \
            -d "${payload}"

      - name: Skip deploy handoff
        if: steps.trigger.outputs.should_continue != 'true' || steps.intent.outputs.should_dispatch != 'true'
        env:
          SKIP_REASON: ${{ steps.trigger.outputs.skip_reason }}
        run: |
          if [[ -n "${SKIP_REASON}" ]]; then
            echo "${SKIP_REASON}"
          else
            echo "No deployable services changed for this successful CI run; skipping deploy handoff."
          fi
