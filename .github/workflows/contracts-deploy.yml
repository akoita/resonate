name: Smart Contract Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment holding deployment secrets.
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging
      target_network:
        description: Chain to target.
        required: true
        default: base-sepolia
        type: choice
        options:
          - base-sepolia
          - sepolia
      operation:
        description: What to run.
        required: true
        default: preflight
        type: choice
        options:
          - preflight
          - deploy-protocol
          - deploy-content-protection
          - deploy-show-campaign-escrow
          - deploy-stem-marketplace
          - upgrade-content-protection
          - set-content-protection-stake
          - set-marketplace-protocol-fee
          - set-show-campaign-fee-config
          - set-show-campaign-confirmer
          - pause-show-campaign-escrow
          - create-show-campaign
          - confirm-show-campaign-booking
          - confirm-show-campaign-fulfillment
          - release-show-campaign-funds
          - verify-base-sepolia
          - verify-base-sepolia-sourcify
      campaign_id:
        description: Campaign id for lifecycle operations
        required: false
        default: ""
        type: string
      verify_contracts:
        description: BaseScan verification mode for Base Sepolia deploys.
        required: true
        default: auto
        type: choice
        options:
          - auto
          - "true"
          - "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FOUNDRY_PROFILE: ci

concurrency:
  group: ${{ github.workflow }}-${{ inputs.environment }}-${{ inputs.target_network }}
  cancel-in-progress: false

jobs:
  deploy:
    name: ${{ inputs.operation }} ${{ inputs.target_network }}
    runs-on: ubuntu-latest
    environment: contracts-${{ inputs.environment }}
    permissions:
      contents: read
    env:
      PRIVATE_KEY: ${{ secrets.CONTRACT_DEPLOYER_PRIVATE_KEY || secrets.PRIVATE_KEY }}
      SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL || vars.SEPOLIA_RPC_URL }}
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL || vars.BASE_SEPOLIA_RPC_URL }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
      VERIFY_CONTRACTS: ${{ inputs.verify_contracts }}
    steps:
      - name: Validate selected operation
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.target_network }}" == "sepolia" && "${{ inputs.operation }}" == verify-base-sepolia* ]]; then
            echo "::error::Base Sepolia verification operations require target_network=base-sepolia."
            exit 1
          fi
          case "${{ inputs.operation }}" in
            confirm-show-campaign-booking|confirm-show-campaign-fulfillment|release-show-campaign-funds)
              if [[ -z "${{ inputs.campaign_id }}" ]]; then
                echo "::error::${{ inputs.operation }} requires campaign_id."
                exit 1
              fi
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: true

      # kernel's pinned .gitmodules omits an entry for its (unused) lib/ExcessivelySafeCall
      # gitlink, so ANY recursive submodule init hard-fails. Init the valid nested deps by name.
      - name: Init kernel nested submodules
        run: git -C contracts/lib/kernel submodule update --init lib/I4337 lib/solady lib/FreshCryptoLib lib/p256-verifier lib/forge-std

      - name: Export optional deployment variables
        shell: bash
        env:
          INPUT_BASESCAN_API_URL: ${{ vars.BASESCAN_API_URL }}
          INPUT_BROADCAST_FILE: ${{ vars.BROADCAST_FILE }}
          INPUT_VERIFY_ONLY: ${{ vars.VERIFY_ONLY }}
          INPUT_VERIFY_RETRIES: ${{ vars.VERIFY_RETRIES }}
          INPUT_VERIFY_DELAY_SECONDS: ${{ vars.VERIFY_DELAY_SECONDS }}
          INPUT_SOURCIFY_API_URL: ${{ vars.SOURCIFY_API_URL }}
          INPUT_SOURCIFY_RETRIES: ${{ vars.SOURCIFY_RETRIES }}
          INPUT_SOURCIFY_DELAY_SECONDS: ${{ vars.SOURCIFY_DELAY_SECONDS }}
          INPUT_X402_FACILITATOR_URL: ${{ vars.X402_FACILITATOR_URL }}
          INPUT_PAYMENT_USDC_ADDRESS: ${{ vars.PAYMENT_USDC_ADDRESS }}
          INPUT_PAYMENT_WETH_ADDRESS: ${{ vars.PAYMENT_WETH_ADDRESS }}
          INPUT_PAYMENT_ENABLE_WETH: ${{ vars.PAYMENT_ENABLE_WETH }}
          INPUT_PAYMENT_REGISTRY_ADMIN: ${{ vars.PAYMENT_REGISTRY_ADMIN }}
          INPUT_PAYMENT_ETH_USD_FEED: ${{ vars.PAYMENT_ETH_USD_FEED }}
          INPUT_PAYMENT_USDC_USD_FEED: ${{ vars.PAYMENT_USDC_USD_FEED }}
          INPUT_PAYMENT_ORACLE_MAX_STALENESS: ${{ vars.PAYMENT_ORACLE_MAX_STALENESS }}
          INPUT_PAYMENT_ASSET_REGISTRY_ADDRESS: ${{ vars.PAYMENT_ASSET_REGISTRY_ADDRESS }}
          INPUT_STEM_NFT_ADDRESS: ${{ vars.STEM_NFT_ADDRESS }}
          INPUT_MARKETPLACE_ADDRESS: ${{ vars.MARKETPLACE_ADDRESS }}
          INPUT_TRANSFER_VALIDATOR_ADDRESS: ${{ vars.TRANSFER_VALIDATOR_ADDRESS }}
          INPUT_EXISTING_ADMIN: ${{ vars.EXISTING_ADMIN }}
          INPUT_CONTENT_PROTECTION_PROXY: ${{ vars.CONTENT_PROTECTION_PROXY }}
          INPUT_CONTENT_PROTECTION_ADDRESS: ${{ vars.CONTENT_PROTECTION_ADDRESS }}
          INPUT_STAKE_ASSET_ADDRESS: ${{ vars.STAKE_ASSET_ADDRESS }}
          INPUT_STAKE_ASSET_AMOUNT: ${{ vars.STAKE_ASSET_AMOUNT }}
          INPUT_STAKE_ASSET_SYMBOL: ${{ vars.STAKE_ASSET_SYMBOL }}
          INPUT_SHOW_CAMPAIGN_ESCROW_OWNER: ${{ vars.SHOW_CAMPAIGN_ESCROW_OWNER }}
          INPUT_SHOW_CAMPAIGN_ESCROW_ADDRESS: ${{ vars.SHOW_CAMPAIGN_ESCROW_ADDRESS }}
          INPUT_SHOW_CAMPAIGN_FEE_BPS: ${{ vars.SHOW_CAMPAIGN_FEE_BPS }}
          INPUT_SHOW_CAMPAIGN_FEE_RECIPIENT: ${{ vars.SHOW_CAMPAIGN_FEE_RECIPIENT }}
          INPUT_FEE_RECIPIENT: ${{ vars.FEE_RECIPIENT }}
          INPUT_PROTOCOL_FEE_BPS: ${{ vars.PROTOCOL_FEE_BPS }}
          INPUT_NEW_PROTOCOL_FEE_BPS: ${{ vars.NEW_PROTOCOL_FEE_BPS }}
          INPUT_NEW_FEE_BPS: ${{ vars.NEW_FEE_BPS }}
          INPUT_NEW_FEE_RECIPIENT: ${{ vars.NEW_FEE_RECIPIENT }}
          INPUT_CONFIRMER_ADDRESS: ${{ vars.CONFIRMER_ADDRESS }}
          INPUT_CONFIRMER_ALLOWED: ${{ vars.CONFIRMER_ALLOWED }}
          INPUT_PAUSED: ${{ vars.PAUSED }}
          INPUT_ARTIST_ID_HASH: ${{ vars.ARTIST_ID_HASH }}
          INPUT_AUTHORITY_HASH: ${{ vars.AUTHORITY_HASH }}
          INPUT_BENEFICIARY: ${{ vars.BENEFICIARY }}
          INPUT_PAYMENT_TOKEN: ${{ vars.PAYMENT_TOKEN }}
          INPUT_GOAL_UNITS: ${{ vars.GOAL_UNITS }}
          INPUT_MIN_BACKERS: ${{ vars.MIN_BACKERS }}
          INPUT_FUNDING_DEADLINE: ${{ vars.FUNDING_DEADLINE }}
          INPUT_BOOKING_DEADLINE: ${{ vars.BOOKING_DEADLINE }}
          INPUT_DEPOSIT_RELEASE_BPS: ${{ vars.DEPOSIT_RELEASE_BPS }}
          INPUT_DISPUTE_WINDOW_SECONDS: ${{ vars.DISPUTE_WINDOW_SECONDS }}
          INPUT_CAMPAIGN_ID: ${{ inputs.campaign_id }}
        run: |
          set -euo pipefail

          if [[ -z "${BASE_SEPOLIA_RPC_URL:-}" ]]; then
            echo "BASE_SEPOLIA_RPC_URL=https://sepolia.base.org" >> "${GITHUB_ENV}"
          fi
          if [[ -z "${SEPOLIA_RPC_URL:-}" ]]; then
            echo "SEPOLIA_RPC_URL=https://sepolia.drpc.org" >> "${GITHUB_ENV}"
          fi

          optional_names=(
            BASESCAN_API_URL
            BROADCAST_FILE
            VERIFY_ONLY
            VERIFY_RETRIES
            VERIFY_DELAY_SECONDS
            SOURCIFY_API_URL
            SOURCIFY_RETRIES
            SOURCIFY_DELAY_SECONDS
            X402_FACILITATOR_URL
            PAYMENT_USDC_ADDRESS
            PAYMENT_WETH_ADDRESS
            PAYMENT_ENABLE_WETH
            PAYMENT_REGISTRY_ADMIN
            PAYMENT_ETH_USD_FEED
            PAYMENT_USDC_USD_FEED
            PAYMENT_ORACLE_MAX_STALENESS
            PAYMENT_ASSET_REGISTRY_ADDRESS
            STEM_NFT_ADDRESS
            MARKETPLACE_ADDRESS
            TRANSFER_VALIDATOR_ADDRESS
            EXISTING_ADMIN
            CONTENT_PROTECTION_PROXY
            CONTENT_PROTECTION_ADDRESS
            STAKE_ASSET_ADDRESS
            STAKE_ASSET_AMOUNT
            STAKE_ASSET_SYMBOL
            SHOW_CAMPAIGN_ESCROW_OWNER
            SHOW_CAMPAIGN_ESCROW_ADDRESS
            SHOW_CAMPAIGN_FEE_BPS
            SHOW_CAMPAIGN_FEE_RECIPIENT
            FEE_RECIPIENT
            PROTOCOL_FEE_BPS
            NEW_PROTOCOL_FEE_BPS
            NEW_FEE_BPS
            NEW_FEE_RECIPIENT
            CONFIRMER_ADDRESS
            CONFIRMER_ALLOWED
            PAUSED
            ARTIST_ID_HASH
            AUTHORITY_HASH
            BENEFICIARY
            PAYMENT_TOKEN
            GOAL_UNITS
            MIN_BACKERS
            FUNDING_DEADLINE
            BOOKING_DEADLINE
            DEPOSIT_RELEASE_BPS
            DISPUTE_WINDOW_SECONDS
            CAMPAIGN_ID
          )

          for name in "${optional_names[@]}"; do
            input_name="INPUT_${name}"
            value="${!input_name:-}"
            if [[ -n "${value}" ]]; then
              printf '%s=%s\n' "${name}" "${value}" >> "${GITHUB_ENV}"
            fi
          done

          case "${{ inputs.target_network }}" in
            base-sepolia)
              echo "RPC_URL=${BASE_SEPOLIA_RPC_URL:-https://sepolia.base.org}" >> "${GITHUB_ENV}"
              ;;
            sepolia)
              echo "RPC_URL=${SEPOLIA_RPC_URL:-https://sepolia.drpc.org}" >> "${GITHUB_ENV}"
              ;;
          esac

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.3

      - name: Install contract dependencies
        run: ./scripts/install-deps.sh
        working-directory: contracts

      - name: Build contracts
        run: forge build
        working-directory: contracts

      - name: Run deployment safety tests
        run: forge test -vvv --no-match-path "test/formal/*"
        working-directory: contracts

      - name: Preflight deployer and network
        if: inputs.operation != 'verify-base-sepolia' && inputs.operation != 'verify-base-sepolia-sourcify'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PRIVATE_KEY:-}" ]]; then
            echo "::error::Set CONTRACT_DEPLOYER_PRIVATE_KEY in the contracts-${{ inputs.environment }} GitHub environment."
            exit 1
          fi

          lt_uint() {
            local left="${1#0}"
            local right="${2#0}"
            left="${left:-0}"
            right="${right:-0}"
            if [[ ${#left} -ne ${#right} ]]; then
              [[ ${#left} -lt ${#right} ]]
              return
            fi
            [[ "${left}" < "${right}" ]]
          }

          case "${{ inputs.operation }}" in
            deploy-content-protection)
              if [[ -z "${STEM_NFT_ADDRESS:-}" || -z "${TRANSFER_VALIDATOR_ADDRESS:-}" ]]; then
                echo "::error::deploy-content-protection requires STEM_NFT_ADDRESS and TRANSFER_VALIDATOR_ADDRESS."
                exit 1
              fi
              ;;
            upgrade-content-protection)
              if [[ -z "${CONTENT_PROTECTION_PROXY:-}" ]]; then
                echo "::error::upgrade-content-protection requires CONTENT_PROTECTION_PROXY."
                exit 1
              fi
              ;;
            set-content-protection-stake)
              if [[ -z "${CONTENT_PROTECTION_ADDRESS:-}" ]]; then
                echo "::error::set-content-protection-stake requires CONTENT_PROTECTION_ADDRESS."
                exit 1
              fi
              if [[ -z "${STAKE_ASSET_ADDRESS:-}" && -z "${PAYMENT_USDC_ADDRESS:-}" ]]; then
                echo "::error::set-content-protection-stake requires STAKE_ASSET_ADDRESS or PAYMENT_USDC_ADDRESS."
                exit 1
              fi
              ;;
            deploy-stem-marketplace)
              if [[ -z "${STEM_NFT_ADDRESS:-}" ]]; then
                echo "::error::deploy-stem-marketplace requires STEM_NFT_ADDRESS."
                exit 1
              fi
              if [[ -z "${CONTENT_PROTECTION_ADDRESS:-}" && -z "${CONTENT_PROTECTION_PROXY:-}" ]]; then
                echo "::error::deploy-stem-marketplace requires CONTENT_PROTECTION_ADDRESS or CONTENT_PROTECTION_PROXY."
                exit 1
              fi
              if [[ -z "${PAYMENT_ASSET_REGISTRY_ADDRESS:-}" ]]; then
                echo "::error::deploy-stem-marketplace requires PAYMENT_ASSET_REGISTRY_ADDRESS."
                exit 1
              fi
              if [[ -z "${FEE_RECIPIENT:-}" ]]; then
                echo "::error::deploy-stem-marketplace requires FEE_RECIPIENT on shared networks."
                exit 1
              fi
              ;;
            set-marketplace-protocol-fee)
              if [[ -z "${MARKETPLACE_ADDRESS:-}" || -z "${NEW_PROTOCOL_FEE_BPS:-}" ]]; then
                echo "::error::set-marketplace-protocol-fee requires MARKETPLACE_ADDRESS and NEW_PROTOCOL_FEE_BPS."
                exit 1
              fi
              ;;
            set-show-campaign-fee-config)
              if [[ -z "${SHOW_CAMPAIGN_ESCROW_ADDRESS:-}" || -z "${NEW_FEE_BPS:-}" || -z "${NEW_FEE_RECIPIENT:-}" ]]; then
                echo "::error::set-show-campaign-fee-config requires SHOW_CAMPAIGN_ESCROW_ADDRESS, NEW_FEE_BPS, and NEW_FEE_RECIPIENT."
                exit 1
              fi
              ;;
            set-show-campaign-confirmer)
              if [[ -z "${SHOW_CAMPAIGN_ESCROW_ADDRESS:-}" || -z "${CONFIRMER_ADDRESS:-}" || -z "${CONFIRMER_ALLOWED:-}" ]]; then
                echo "::error::set-show-campaign-confirmer requires SHOW_CAMPAIGN_ESCROW_ADDRESS, CONFIRMER_ADDRESS, and CONFIRMER_ALLOWED."
                exit 1
              fi
              ;;
            pause-show-campaign-escrow)
              if [[ -z "${SHOW_CAMPAIGN_ESCROW_ADDRESS:-}" || -z "${PAUSED:-}" ]]; then
                echo "::error::pause-show-campaign-escrow requires SHOW_CAMPAIGN_ESCROW_ADDRESS and PAUSED."
                exit 1
              fi
              ;;
            create-show-campaign)
              required_names=(
                SHOW_CAMPAIGN_ESCROW_ADDRESS
                ARTIST_ID_HASH
                AUTHORITY_HASH
                BENEFICIARY
                PAYMENT_TOKEN
                GOAL_UNITS
                MIN_BACKERS
                FUNDING_DEADLINE
                BOOKING_DEADLINE
              )
              for name in "${required_names[@]}"; do
                if [[ -z "${!name:-}" ]]; then
                  echo "::error::create-show-campaign requires ${name}."
                  exit 1
                fi
              done
              ;;
            confirm-show-campaign-booking)
              if [[ -z "${SHOW_CAMPAIGN_ESCROW_ADDRESS:-}" || -z "${CAMPAIGN_ID:-}" ]]; then
                echo "::error::confirm-show-campaign-booking requires SHOW_CAMPAIGN_ESCROW_ADDRESS and campaign_id."
                exit 1
              fi
              ;;
            confirm-show-campaign-fulfillment)
              if [[ -z "${SHOW_CAMPAIGN_ESCROW_ADDRESS:-}" || -z "${CAMPAIGN_ID:-}" ]]; then
                echo "::error::confirm-show-campaign-fulfillment requires SHOW_CAMPAIGN_ESCROW_ADDRESS and campaign_id."
                exit 1
              fi
              ;;
            release-show-campaign-funds)
              if [[ -z "${SHOW_CAMPAIGN_ESCROW_ADDRESS:-}" || -z "${CAMPAIGN_ID:-}" ]]; then
                echo "::error::release-show-campaign-funds requires SHOW_CAMPAIGN_ESCROW_ADDRESS and campaign_id."
                exit 1
              fi
              ;;
          esac

          case "${{ inputs.target_network }}" in
            base-sepolia)
              rpc_url="${BASE_SEPOLIA_RPC_URL:-}"
              expected_chain_id="84532"
              minimum_wei="10000000000000000"
              ;;
            sepolia)
              rpc_url="${SEPOLIA_RPC_URL:-}"
              expected_chain_id="11155111"
              minimum_wei="10000000000000000"
              ;;
            *)
              echo "::error::Unsupported network."
              exit 1
              ;;
          esac

          if [[ -z "${rpc_url}" ]]; then
            echo "::error::Missing RPC URL for ${{ inputs.target_network }}."
            exit 1
          fi

          chain_id="$(cast chain-id --rpc-url "${rpc_url}")"
          if [[ "${chain_id}" != "${expected_chain_id}" ]]; then
            echo "::error::RPC resolved chain ${chain_id}; expected ${expected_chain_id}."
            exit 1
          fi

          deployer="$(cast wallet address "${PRIVATE_KEY}")"
          balance_wei="$(cast balance "${deployer}" --rpc-url "${rpc_url}")"
          balance_eth="$(cast from-wei "${balance_wei}")"
          if lt_uint "${balance_wei}" "${minimum_wei}"; then
            echo "::error::Deployer ${deployer} has ${balance_eth} ETH on ${{ inputs.target_network }}; need at least 0.01 ETH."
            exit 1
          fi

          {
            echo "### Contract deployment preflight"
            echo ""
            echo "- environment: \`contracts-${{ inputs.environment }}\`"
            echo "- target network: \`${{ inputs.target_network }}\`"
            echo "- chain id: \`${chain_id}\`"
            echo "- deployer: \`${deployer}\`"
            echo "- balance: \`${balance_eth} ETH\`"
            echo "- operation: \`${{ inputs.operation }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Deploy full protocol graph to Base Sepolia
        if: inputs.operation == 'deploy-protocol' && inputs.target_network == 'base-sepolia'
        run: make deploy-base-sepolia

      - name: Deploy full protocol graph to Sepolia
        if: inputs.operation == 'deploy-protocol' && inputs.target_network == 'sepolia'
        run: make deploy-sepolia

      - name: Deploy content protection add-on
        if: inputs.operation == 'deploy-content-protection'
        run: |
          set -euo pipefail
          cd contracts
          forge script script/DeployContentProtection.s.sol \
            --rpc-url "${RPC_URL}" \
            --broadcast \
            --evm-version cancun \
            --via-ir \
            --slow

      - name: Deploy show campaign escrow
        if: inputs.operation == 'deploy-show-campaign-escrow'
        run: make deploy-show-campaign-escrow

      - name: Deploy stem marketplace
        if: inputs.operation == 'deploy-stem-marketplace'
        run: make deploy-stem-marketplace

      - name: Upgrade content protection proxy
        if: inputs.operation == 'upgrade-content-protection'
        run: |
          set -euo pipefail
          cd contracts
          forge script script/UpgradeContentProtection.s.sol \
            --rpc-url "${RPC_URL}" \
            --broadcast \
            --evm-version cancun \
            --via-ir \
            --slow

      - name: Update content protection stake policy
        if: inputs.operation == 'set-content-protection-stake'
        run: |
          set -euo pipefail
          cd contracts
          forge script script/SetContentProtectionStablecoinStake.s.sol \
            --rpc-url "${RPC_URL}" \
            --broadcast \
            --evm-version cancun \
            --via-ir \
            --slow

      - name: Update marketplace protocol fee
        if: inputs.operation == 'set-marketplace-protocol-fee'
        run: make set-marketplace-protocol-fee

      - name: Update show campaign fee config
        if: inputs.operation == 'set-show-campaign-fee-config'
        run: make set-show-campaign-fee-config

      - name: Update show campaign confirmer
        if: inputs.operation == 'set-show-campaign-confirmer'
        run: make set-show-campaign-confirmer

      - name: Pause or unpause show campaign escrow
        if: inputs.operation == 'pause-show-campaign-escrow'
        run: make pause-show-campaign-escrow

      - name: Create and activate show campaign
        if: inputs.operation == 'create-show-campaign'
        run: make create-show-campaign

      - name: Confirm show campaign booking
        if: inputs.operation == 'confirm-show-campaign-booking'
        shell: bash
        env:
          INPUT_CAMPAIGN_ID: ${{ inputs.campaign_id }}
        run: |
          set -euo pipefail
          if [[ -z "${INPUT_CAMPAIGN_ID}" ]]; then
            echo "::error::confirm-show-campaign-booking requires campaign_id."
            exit 1
          fi
          export CAMPAIGN_ID="${INPUT_CAMPAIGN_ID}"
          make confirm-show-campaign-booking

      - name: Confirm show campaign fulfillment
        if: inputs.operation == 'confirm-show-campaign-fulfillment'
        shell: bash
        env:
          INPUT_CAMPAIGN_ID: ${{ inputs.campaign_id }}
        run: |
          set -euo pipefail
          if [[ -z "${INPUT_CAMPAIGN_ID}" ]]; then
            echo "::error::confirm-show-campaign-fulfillment requires campaign_id."
            exit 1
          fi
          export CAMPAIGN_ID="${INPUT_CAMPAIGN_ID}"
          make confirm-show-campaign-fulfillment

      - name: Release show campaign funds
        if: inputs.operation == 'release-show-campaign-funds'
        shell: bash
        env:
          INPUT_CAMPAIGN_ID: ${{ inputs.campaign_id }}
        run: |
          set -euo pipefail
          if [[ -z "${INPUT_CAMPAIGN_ID}" ]]; then
            echo "::error::release-show-campaign-funds requires campaign_id."
            exit 1
          fi
          export CAMPAIGN_ID="${INPUT_CAMPAIGN_ID}"
          make release-show-campaign-funds

      - name: Verify Base Sepolia contracts on BaseScan
        if: inputs.operation == 'verify-base-sepolia'
        run: make verify-base-sepolia

      - name: Verify Base Sepolia contracts on Sourcify
        if: inputs.operation == 'verify-base-sepolia-sourcify'
        run: make verify-base-sepolia-sourcify

      - name: Summarize admin/config operation
        if: inputs.operation == 'set-marketplace-protocol-fee' || inputs.operation == 'set-show-campaign-fee-config' || inputs.operation == 'set-show-campaign-confirmer' || inputs.operation == 'pause-show-campaign-escrow' || inputs.operation == 'create-show-campaign' || inputs.operation == 'confirm-show-campaign-booking' || inputs.operation == 'confirm-show-campaign-fulfillment' || inputs.operation == 'release-show-campaign-funds'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Contract admin/config operation"
            echo ""
            echo "- operation: \`${{ inputs.operation }}\`"
            echo "- target network: \`${{ inputs.target_network }}\`"
            echo "- owner key note: signer from \`CONTRACT_DEPLOYER_PRIVATE_KEY\` / \`PRIVATE_KEY\` must be the target contract owner"
            case "${{ inputs.operation }}" in
              set-marketplace-protocol-fee)
                echo "- marketplace: \`${MARKETPLACE_ADDRESS}\`"
                echo "- new protocol fee BPS: \`${NEW_PROTOCOL_FEE_BPS}\`"
                echo "- new fee recipient: \`${NEW_FEE_RECIPIENT:-unchanged}\`"
                ;;
              set-show-campaign-fee-config)
                echo "- show campaign escrow: \`${SHOW_CAMPAIGN_ESCROW_ADDRESS}\`"
                echo "- new fee BPS: \`${NEW_FEE_BPS}\`"
                echo "- new fee recipient: \`${NEW_FEE_RECIPIENT}\`"
                echo "- note: rate applies to future campaigns only; recipient rotates at charge time"
                ;;
              set-show-campaign-confirmer)
                echo "- show campaign escrow: \`${SHOW_CAMPAIGN_ESCROW_ADDRESS}\`"
                echo "- confirmer: \`${CONFIRMER_ADDRESS}\`"
                echo "- allowed: \`${CONFIRMER_ALLOWED}\`"
                ;;
              pause-show-campaign-escrow)
                echo "- show campaign escrow: \`${SHOW_CAMPAIGN_ESCROW_ADDRESS}\`"
                echo "- paused: \`${PAUSED}\`"
                ;;
              create-show-campaign)
                echo "- show campaign escrow: \`${SHOW_CAMPAIGN_ESCROW_ADDRESS}\`"
                echo "- beneficiary: \`${BENEFICIARY}\`"
                echo "- payment token: \`${PAYMENT_TOKEN}\`"
                echo "- goal units: \`${GOAL_UNITS}\`"
                echo "- funding deadline: \`${FUNDING_DEADLINE}\`"
                echo "- booking deadline: \`${BOOKING_DEADLINE}\`"
                echo "- campaign id: see Forge log line \`CAMPAIGN_ID\`"
                ;;
              confirm-show-campaign-booking)
                echo "- show campaign escrow: \`${SHOW_CAMPAIGN_ESCROW_ADDRESS}\`"
                echo "- campaign id: \`${CAMPAIGN_ID}\`"
                echo "- note: signer must be an allowed confirmer"
                ;;
              confirm-show-campaign-fulfillment)
                echo "- show campaign escrow: \`${SHOW_CAMPAIGN_ESCROW_ADDRESS}\`"
                echo "- campaign id: \`${CAMPAIGN_ID}\`"
                echo "- note: signer must be an allowed confirmer"
                ;;
              release-show-campaign-funds)
                echo "- show campaign escrow: \`${SHOW_CAMPAIGN_ESCROW_ADDRESS}\`"
                echo "- campaign id: \`${CAMPAIGN_ID}\`"
                echo "- note: release is permissionless after the dispute window; Forge logs total released and fee paid"
                ;;
            esac
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Summarize deployment outputs
        if: inputs.operation != 'preflight'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Contract deployment outputs"
            echo ""
            if [[ -f contracts/deployments/base-sepolia.json ]]; then
              echo "- Base Sepolia deployment record: \`contracts/deployments/base-sepolia.json\`"
            fi
            if [[ -f contracts/deployments/base-sepolia.remote.env ]]; then
              echo "- Base Sepolia environment handoff: \`contracts/deployments/base-sepolia.remote.env\`"
            fi
            if [[ -f "contracts/deployments/show-campaign-escrow.${{ inputs.target_network }}.json" ]]; then
              echo "- ShowCampaignEscrow deployment record: \`contracts/deployments/show-campaign-escrow.${{ inputs.target_network }}.json\`"
            fi
            if [[ -f "contracts/deployments/show-campaign-escrow.${{ inputs.target_network }}.remote.env" ]]; then
              echo "- ShowCampaignEscrow environment handoff: \`contracts/deployments/show-campaign-escrow.${{ inputs.target_network }}.remote.env\`"
            fi
            if [[ -f contracts/deployments/show-campaign-escrow.abi.json ]]; then
              echo "- ShowCampaignEscrow ABI handoff: \`contracts/deployments/show-campaign-escrow.abi.json\`"
            fi
            if [[ -f "contracts/deployments/stem-marketplace.${{ inputs.target_network }}.json" ]]; then
              echo "- StemMarketplaceV2 deployment record: \`contracts/deployments/stem-marketplace.${{ inputs.target_network }}.json\`"
            fi
            if [[ -f "contracts/deployments/stem-marketplace.${{ inputs.target_network }}.remote.env" ]]; then
              echo "- StemMarketplaceV2 environment handoff: \`contracts/deployments/stem-marketplace.${{ inputs.target_network }}.remote.env\`"
            fi
            if [[ -f contracts/deployments/stem-marketplace.abi.json ]]; then
              echo "- StemMarketplaceV2 ABI handoff: \`contracts/deployments/stem-marketplace.abi.json\`"
            fi
            if [[ -f contracts/deployments/sepolia.json ]]; then
              echo "- Sepolia deployment record: \`contracts/deployments/sepolia.json\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload deployment records
        if: inputs.operation != 'preflight'
        uses: actions/upload-artifact@v4
        with:
          name: contract-deployment-${{ inputs.target_network }}-${{ github.run_id }}
          path: |
            contracts/deployments/*.json
            contracts/deployments/*.env
            contracts/broadcast/**/*.json
          if-no-files-found: warn
          retention-days: 30
