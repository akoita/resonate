name: Formal Verification

# Symbolic (Halmos) verification of the contract `check_*` properties under
# `contracts/test/formal/`. This complements the unit/fuzz/invariant suite run by
# the main `Smart Contract Tests` job (which excludes `test/formal/*`).
#
# This is a REQUIRED, blocking gate. The formal suite holds only the positive
# conservation/safety properties Halmos verifies cleanly (every `check_*` passes
# — 12 checks across the five custody/marketplace contracts). Revert-path
# properties need `vm.expectRevert` (unsupported by Halmos) and live in the
# fuzz/unit suites + the Certora with-revert rules instead, so they are not
# duplicated here. A genuine counterexample fails this job.

on:
  push:
    branches: [main]
    # Match the pull_request filter: the post-merge run on main is only
    # meaningful when contracts (or this workflow) changed. Without this,
    # every merge to main — including frontend/docs-only ones — re-ran the
    # ~30-min Halmos + Foundry suite for no contract change.
    paths:
      - "contracts/**"
      - ".github/workflows/formal.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/formal.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: formal-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  halmos:
    name: Halmos Symbolic Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: true

      # kernel's pinned .gitmodules omits an entry for its (unused) lib/ExcessivelySafeCall
      # gitlink, so ANY recursive submodule init hard-fails. Init the valid nested deps by name.
      - name: Init kernel nested submodules
        run: git -C contracts/lib/kernel submodule update --init lib/I4337 lib/solady lib/FreshCryptoLib lib/p256-verifier lib/forge-std

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.3

      - name: Install contract dependencies
        run: ./scripts/install-deps.sh
        working-directory: contracts

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Halmos
        # Pinned for reproducibility — a new release could change discovery /
        # cheatcode handling and silently flip results on an unrelated PR.
        run: pip install halmos==0.3.3

      # `--function check_` scopes symbolic execution to the formal `check_*`
      # properties (the unit/fuzz/invariant tests run under `forge test`).
      # Blocking: a non-zero exit (counterexample or error) fails the job.
      - name: Run Halmos symbolic tests
        run: halmos --function check_
        working-directory: contracts
